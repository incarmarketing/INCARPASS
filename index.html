                                    <button onClick={() => setShowChangeLog(false)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="p-4 pb-12 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50">
                                    {changeLogs.length === 0 ? (
                                        <div className="text-center text-slate-400 py-10 text-sm">변경 이력이 없습니다.</div>
                                    ) : (
                                        <div className="space-y-3">
                                            {changeLogs.map(log => (
                                                <div key={log.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-center text-xs text-slate-400 mb-2 border-b border-slate-100 pb-2">
                                                        <span>{formatDateSafe(log.timestamp)}</span>
                                                        <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold break-keep">{log.name} ({log.uid})</span>
                                                    </div>
                                                    <div className="font-bold text-sm text-slate-800 mb-1 break-keep">{cleanOptionKey(log.targetOption)} 변경</div>
                                                    <div className="flex flex-wrap items-center gap-2 text-sm text-slate-600 mb-2 break-keep">
                                                        <span className="line-through opacity-70">{log.oldVal}</span>
                                                        <Icon name="chevronsDown" size={14} className="rotate-[-90deg] text-slate-300" />
                                                        <span className="text-incar font-bold">{log.newVal}</span>
                                                    </div>
                                                    <div className="text-xs text-slate-500 bg-slate-50 p-2 rounded-lg border border-slate-100 break-keep leading-relaxed">
                                                        <span className="font-bold mr-1">사유:</span> {log.reason}
                                                        {log.penalty !== 0 && <span className={`ml-2 font-bold block sm:inline mt-1 sm:mt-0 ${log.penalty > 0 ? 'text-rose-500' : 'text-emerald-500'}`}>{log.penalty > 0 ? `(미반환/ ${CURRENCY}${log.penalty})` : `(반환/마이너스 정산 ${CURRENCY}${Math.abs(log.penalty)})`}</span>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ScanView = ({ mode, schedules, targetSessionId, setTargetSessionId, targetBus, setTargetBus, manualBus, setManualBus, isScanning, setIsScanning, processScan, users, isMobile, busList, setBusList, scanResult, logs, handleFastAction }) => {
            const scannerRef = useRef(null); const isRunningRef = useRef(false);
            const [manualCode, setManualCode] = useState('');
            const [cameraList, setCameraList] = useState([]);
            const [currentCamId, setCurrentCamId] = useState(null);
            const [listSearch, setListSearch] = useState('');
            const [scanTab, setScanTab] = useState('yet');
            const [isExpandedList, setIsExpandedList] = useState(false);
            
            const isProcessingRef = useRef(false);

            useEffect(() => {
                if (isScanning) {
                    document.body.classList.add('scanning-active');
                } else {
                    document.body.classList.remove('scanning-active');
                }
                return () => document.body.classList.remove('scanning-active');
            }, [isScanning]);

            useEffect(() => {
                return () => {
                    if (scannerRef.current && isRunningRef.current) {
                        try {
                            scannerRef.current.stop().then(() => {
                                if (scannerRef.current) scannerRef.current.clear();
                            }).catch(() => {});
                        } catch(e) {}
                        isRunningRef.current = false;
                    }
                    setIsScanning(false);
                };
            }, [setIsScanning]);

            useEffect(() => {
                if (!scanResult) {
                    const timer = setTimeout(() => { isProcessingRef.current = false; }, 500);
                    return () => clearTimeout(timer);
                } else {
                    isProcessingRef.current = true;
                }
            }, [scanResult]);

            const filteredSchedules = useMemo(() => schedules.filter(s => s.type === mode), [schedules, mode]);
            useEffect(() => { if (filteredSchedules.length > 0) { const exists = filteredSchedules.find(s => s.id === targetSessionId); if (!exists) setTargetSessionId(filteredSchedules[0].id); } else { setTargetSessionId(''); } }, [mode, filteredSchedules]);
            
            const selectedSession = useMemo(() => filteredSchedules.find(s => s.id === targetSessionId), [filteredSchedules, targetSessionId]);
            const domainInfo = getSessionDomainInfo(selectedSession);

            useEffect(() => { setScanTab('yet'); }, [targetSessionId, mode, targetBus]);

            useEffect(() => {
                let barcodeStr = '';
                let timeout = null;
                const handleKeyDown = async (e) => {
                    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'Enter') {
                        if (barcodeStr.length > 0) {
                            if (isProcessingRef.current) { barcodeStr = ''; return; } 
                            isProcessingRef.current = true;
                            const res = await processScan(barcodeStr);
                            if (res === false) isProcessingRef.current = false;
                            barcodeStr = '';
                        }
                    } else if (e.key.length === 1) { 
                        barcodeStr += e.key;
                        clearTimeout(timeout);
                        timeout = setTimeout(() => { barcodeStr = ''; }, 100); 
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [processScan]);


            const handleAddBus = () => {
                let nextNum = 1;
                if (busList.length > 0) {
                    const nums = busList.map(b => { const match = b.match(/(\d+)호차/); return match ? parseInt(match[1]) : 0; });
                    nextNum = Math.max(...nums, 0) + 1;
                }
                const newBus = `${nextNum}호차`;
                setBusList([...busList, newBus]);
                if(!manualBus) setTargetBus(newBus);
            };

            const handleRenameBus = (index) => {
                const oldName = busList[index];
                const newName = prompt(`'${oldName}'의 새로운 이름을 입력하세요:`, oldName);
                if (newName && newName.trim()) {
                    const newList = [...busList]; newList[index] = newName.trim(); setBusList(newList);
                    if(targetBus === oldName) setTargetBus(newName.trim());
                }
            };

            const handleDeleteBus = (index, e) => {
                e.stopPropagation();
                if(confirm(`'${busList[index]}'을(를) 삭제하시겠습니까?`)){
                    const newList = busList.filter((_, i) => i !== index); setBusList(newList);
                    if(targetBus === busList[index] && newList.length > 0) setTargetBus(newList[0]);
                }
            };

            const executeScanner = async (camIdToUse = null) => {
                if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");
                
                let cams = cameraList;
                if (cams.length === 0) {
                    try { 
                        const allCams = await Html5Qrcode.getCameras(); 
                        cams = allCams.filter(c => {
                            const label = c.label.toLowerCase();
                            return !label.includes('front') && !label.includes('전면') && !label.includes('user');
                        });
                        if(cams.length === 0) cams = allCams;
                        setCameraList(cams); 
                    } catch(e){}
                }

                let targetId = camIdToUse;
                if (!targetId) {
                    const savedCamId = localStorage.getItem('incar_pro_cam_id');
                    if (savedCamId && cams.some(c => c.id === savedCamId)) {
                        targetId = savedCamId;
                    } else if (cams.length > 0) {
                        targetId = cams[cams.length - 1].id; 
                    }
                }
                if (targetId) setCurrentCamId(targetId);

                let configForStart;
                if (targetId) {
                    configForStart = targetId; 
                } else {
                    configForStart = { facingMode: "environment" }; 
                }

                const config = {
                    fps: 30, 
                    qrbox: function(vw, vh) {
                        const min = Math.min(vw, vh);
                        return { width: Math.floor(min * 0.85), height: Math.floor(min * 0.85) }; 
                    },
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                };

                const onScan = async (decodedText) => {
                    if (isProcessingRef.current) return; 
                    isProcessingRef.current = true;
                    const res = await processScan(decodedText);
                    if (res === false) isProcessingRef.current = false;
                };

                try {
                    await scannerRef.current.start(configForStart, config, onScan, undefined);
                    isRunningRef.current = true;
                } catch(e) {
                     try {
                         await scannerRef.current.start({ facingMode: "environment" }, config, onScan, undefined);
                         isRunningRef.current = true;
                     } catch(e2) {
                         setIsScanning(false); alert("카메라 접근에 최종 실패했습니다. 권한을 확인해주세요.");
                     }
                }
            };

            const startScanner = () => {
                if (!targetSessionId) return alert("선택된 일정이 없습니다.");
                if (isRunningRef.current) return; 
                setIsScanning(true);
                setTimeout(() => executeScanner(), 200);
            };

            const stopScanner = () => {
                if (scannerRef.current && isRunningRef.current) {
                    scannerRef.current.stop().then(() => {
                        scannerRef.current.clear();
                        isRunningRef.current = false;
                        setIsScanning(false);
                    }).catch(() => {
                        isRunningRef.current = false;
                        setIsScanning(false);
                    });
                } else {
                    setIsScanning(false);
                }
            };

            const handleSwitchCamera = () => {
                if (cameraList.length < 2) return alert("전환 가능한 다른 렌즈가 없습니다.");
                const currentIdx = cameraList.findIndex(c => c.id === currentCamId);
                const nextIdx = (currentIdx + 1) % cameraList.length;
                const nextCamId = cameraList[nextIdx].id;
                setCurrentCamId(nextCamId);
                
                localStorage.setItem('incar_pro_cam_id', nextCamId);

                if (scannerRef.current && isRunningRef.current) {
                    scannerRef.current.stop().then(() => {
                        isRunningRef.current = false;
                        setTimeout(() => executeScanner(nextCamId), 200);
                    }).catch(() => {});
                }
            };

            const handleManualSubmit = async (e) => {
                e.preventDefault();
                if(manualCode.trim()) {
                    if (isProcessingRef.current) return;
                    isProcessingRef.current = true;
                    const res = await processScan(manualCode.trim());
                    if (res === false) isProcessingRef.current = false;
                    setManualCode('');
                }
            }

            const searchedUsers = useMemo(() => {
                const term = manualCode.trim().toLowerCase();
                if (!term) return [];
                return users.filter(u => u.name.toLowerCase().includes(term) || String(u.uid).includes(term)).slice(0, 5);
            }, [manualCode, users]);

            const targetUsersList = useMemo(() => {
                if (!selectedSession) return [];
                const allTargets = users.filter(u => getUserSessionInfo(u, selectedSession).isTarget);
                
                let filtered = [];
                const dInfo = getSessionDomainInfo(selectedSession);

                if (mode === 'PAYMENT' || dInfo.isOutbound) filtered = allTargets;
                else {
                    filtered = allTargets.filter(u => {
                        const expectedBus = getUserSessionInfo(u, selectedSession).expectedBus;
                        const log = logs.find(l => l.uid === String(u.uid) && l.sessionId === selectedSession.id && !l.isCancelled);
                        if (log) return log.bus === targetBus;
                        return expectedBus === targetBus || expectedBus === targetBus.replace('호차','');
                    });
                }
                return filtered.sort((a, b) => a.name.localeCompare(b.name));
            }, [users, selectedSession, mode, targetBus, logs]);

            const filteredTargetUsers = useMemo(() => {
                if (!listSearch.trim()) return targetUsersList;
                const term = listSearch.trim().toLowerCase();
                return targetUsersList.filter(u => u.name.toLowerCase().includes(term) || String(u.uid).includes(term));
            }, [targetUsersList, listSearch]);

            const { doneUsers, yetUsers } = useMemo(() => {
                if (!selectedSession) return { doneUsers: [], yetUsers: [] };
                const done = [];
                const yet = [];
                filteredTargetUsers.forEach(u => {
                    const log = logs.find(l => l.uid === String(u.uid) && l.sessionId === selectedSession.id && !l.isCancelled);
                    if (log) done.push({ ...u, log });
                    else yet.push(u);
                });
                return { doneUsers: done, yetUsers: yet };
            }, [filteredTargetUsers, logs, selectedSession]);

            const currentList = scanTab === 'done' ? doneUsers : yetUsers;

            const activeBusesForSession = useMemo(() => {
                if (!selectedSession || manualBus) return busList;
                const buses = new Set();
                users.forEach(u => {
                    const { isTarget, expectedBus } = getUserSessionInfo(u, selectedSession);
                    if (isTarget && expectedBus && expectedBus !== '미정' && expectedBus !== '-' && expectedBus !== '자유일정') {
                        const b = busList.find(bl => bl === expectedBus || bl.replace('호차','') === expectedBus.replace('호차',''));
                        if (b) buses.add(b);
                    }
                });
                const sorted = Array.from(buses).sort((a, b) => (parseInt(a) || 0) - (parseInt(b) || 0));
                return sorted.length > 0 ? sorted : busList;
            }, [users, selectedSession, busList, manualBus]);

            useEffect(() => {
                if (!manualBus && activeBusesForSession.length > 0 && !activeBusesForSession.includes(targetBus)) {
                    setTargetBus(activeBusesForSession[0]);
                }
            }, [activeBusesForSession, targetBus, manualBus]);

            return (
                <div className="space-y-6 h-full flex flex-col animate-slide-up">
                    <div className="bg-white p-6 rounded-3xl shadow-card border border-slate-200">
                        <div className="flex items-center gap-2 mb-4"><span className={`px-2 py-1 rounded-lg text-xs font-bold ${mode==='BOARDING'?'bg-incar text-white':'bg-emerald-500 text-white'}`}>{mode==='BOARDING' ? 'STEP 1' : '지급'}</span><h3 className="text-lg font-bold text-slate-800 break-keep">{mode==='BOARDING' ? '일정을 선택하세요' : '지급 항목을 선택하세요'}</h3></div>
                        <div className="mb-6">
                            {filteredSchedules.length > 0 ? (
                                <select value={targetSessionId} onChange={(e) => setTargetSessionId(e.target.value)} className={`w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-lg outline-none focus:ring-4 transition-all break-keep ${mode==='BOARDING'?'focus:ring-incar/20':'focus:ring-emerald-500/20'}`}>
                                    {filteredSchedules.map(s => {
                                        const dInfo = getSessionDomainInfo(s);
                                        return <option key={s.id} value={s.id}>[{s.displayDate}] {s.title} ({dInfo.action})</option>
                                    })}
                                </select>
                            ) : (
                                <div className="p-4 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200 break-keep">진행 가능한 일정이 없습니다.</div>
                            )}
                        </div>
                        {mode === 'BOARDING' && filteredSchedules.length > 0 && (
                            <div className="animate-slide-up">
                                {domainInfo.isOutbound ? (
                                    <div className="flex items-center gap-3 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                                        <div className="w-10 h-10 rounded-full bg-white text-incar flex items-center justify-center shadow-sm shrink-0"><Icon name="plane" size={24} /></div>
                                        <div>
                                            <h4 className="font-bold text-indigo-900 text-sm">해당 일정은 항공(출국) 일정입니다.</h4>
                                            <p className="text-xs text-indigo-700 mt-0.5">버스 호차 대신 참가자의 <strong>[배정항공]</strong>을 기준으로 자동 확인합니다.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        {domainInfo.isInbound && (
                                            <div className="flex items-center gap-3 bg-indigo-50 p-4 rounded-xl border border-indigo-100 mb-3">
                                                <div className="w-10 h-10 rounded-full bg-white text-incar flex items-center justify-center shadow-sm shrink-0"><Icon name="plane" size={24} /></div>
                                                <div>
                                                    <h4 className="font-bold text-indigo-900 text-sm">귀국(공항 이동) 일정입니다.</h4>
                                                    <p className="text-xs text-indigo-700 mt-0.5">호텔 환송 행사 후 탑승할 <strong>[버스 호차]</strong>를 선택하고 스캔해주세요.</p>
                                                </div>
                                            </div>
                                        )}
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-3 w-full">
                                            <div className="flex items-center gap-2 shrink-0"><span className="px-2 py-1 rounded-lg text-[10px] sm:text-xs font-bold bg-slate-800 text-white">STEP 2</span><h3 className="text-base sm:text-lg font-bold text-slate-800 break-keep">현장 차량을 선택하세요</h3></div>
                                            <div className="flex gap-2 items-center shrink-0 w-full sm:w-auto">
                                                <button onClick={()=>setManualBus(!manualBus)} className={`text-[10px] sm:text-xs font-bold px-3 py-1.5 rounded-lg transition-colors shrink-0 whitespace-nowrap ${manualBus ? 'bg-incar text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>
                                                    {manualBus ? '관리 완료' : '차량 추가/수정'}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                            {activeBusesForSession.map((bus, i) => (
                                                <div key={i} className="relative group">
                                                    <button onClick={() => manualBus ? handleRenameBus(busList.indexOf(bus)) : setTargetBus(bus)} className={`w-full py-3 rounded-xl text-sm font-bold transition-all relative break-keep ${targetBus === bus && !manualBus ? 'bg-incar text-white shadow-lg scale-105 z-10' : manualBus ? 'bg-white border-2 border-dashed border-indigo-200 text-indigo-400 hover:bg-indigo-50' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                                        {bus}
                                                        {manualBus && <span className="absolute bottom-0.5 right-1 text-[8px] opacity-50">수정</span>}
                                                    </button>
                                                    {manualBus && <button onClick={(e) => handleDeleteBus(busList.indexOf(bus), e)} className="absolute -top-2 -right-2 w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-md z-20 hover:scale-110"><Icon name="x" size={12} /></button>}
                                                </div>
                                            ))}
                                            {manualBus && <button onClick={handleAddBus} className="py-3 rounded-xl text-sm font-bold bg-slate-50 border-2 border-dashed border-slate-200 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-all flex items-center justify-center"><Icon name="plus" size={20} /></button>}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                    
                    <div className="mt-2 mb-2 flex flex-col gap-3">
                        {/* 🔥 버튼명 변경: 아이콘 제거 및 텍스트 명확화 */}
                        <button disabled={filteredSchedules.length === 0} onClick={startScanner} className={`w-full py-6 text-white rounded-3xl font-black text-2xl shadow-xl flex items-center justify-center gap-3 transition-transform break-keep ${filteredSchedules.length === 0 ? 'bg-slate-300 shadow-none cursor-not-allowed' : mode==='BOARDING'?'bg-incar shadow-incar/30 active:scale-95':'bg-emerald-500 shadow-emerald-500/30 active:scale-95'}`}>스캔하기</button>
                        
                        {filteredSchedules.length > 0 && selectedSession && (
                            <button onClick={() => setIsExpandedList(true)} className={`w-full py-4 font-black text-lg rounded-2xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-sm border ${mode==='BOARDING'?'bg-indigo-50 text-incar border-indigo-100 hover:bg-indigo-100':'bg-emerald-50 text-emerald-600 border-emerald-100 hover:bg-emerald-100'}`}>
                                직접 입력 (명단)
                            </button>
                        )}
                    </div>

                                                        <div className="flex items-center gap-3">
                                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0 ${isBoarded ? (mode==='BOARDING'?'bg-incar':'bg-emerald-500') : 'bg-slate-300'}`}>{u.name[0]}</div>
                                                            <div>

                                                                    {isBoarded && <span className={`text-[9px] px-1.5 py-0.5 rounded font-black ${mode==='BOARDING'?'bg-incar text-white':'bg-emerald-500 text-white'}`}>{mode==='BOARDING'?'탑승완료':'지급완료'}</span>}

                                                        <div>

                            <div className="relative mt-auto">

                                                        <button
                                                            type="button"

                                                            className={`px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm transition-colors shrink-0 cursor-pointer ${mode === 'BOARDING' ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-emerald-500 text-white hover:bg-emerald-600'}`}

                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 relative z-40 hidden md:block">
                                    <form onSubmit={handleManualSubmit} className="flex gap-2">
                                        <div className="flex-1 relative">

                    {isScanning && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-6 animate-fade-in">
                            <button onClick={stopScanner} className="absolute top-8 right-8 text-white p-3 bg-white/10 rounded-full z-[101]"><Icon name="x" size={32} /></button>

                            <p className="text-white mt-8 font-bold text-xl animate-pulse text-center break-keep">참가자 명찰의 QR코드를 비춰주세요</p>
                            
                            {cameraList.length > 1 && (

                            <p className="text-amber-400 mt-4 text-xs text-center break-keep font-medium leading-relaxed">

                    {isExpandedList && selectedSession && (
                        <div className="fixed inset-0 z-[300] bg-slate-50 flex flex-col animate-slide-up">
                            {/* 🔥 상단 배너 가림 방지를 위해 pt-20 (안전 여백) 추가 */}
                            <div className="p-4 bg-white border-b border-slate-200 flex justify-between items-center shadow-sm pb-2 pt-safe md:pt-4 pt-16 shrink-0">
                                <div>
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                                        <Icon name={mode==='BOARDING'?'users':'money'} size={20} className={mode==='BOARDING'?'text-incar':'text-emerald-500'} />
                                        {mode === 'BOARDING' ? <><span className="text-incar bg-indigo-50 px-2 py-0.5 rounded ml-1 mr-1">[{domainInfo.isOutbound ? '항공전체' : targetBus}]</span> 탑승 명단</> : '전체 명단'}
                                    </h3>
                                    <span className="text-xs text-slate-500 font-bold mt-1 block">{filteredTargetUsers.length}명 대상</span>
                                </div>
                                <button onClick={() => setIsExpandedList(false)} className="p-3 bg-slate-100 text-slate-600 rounded-full hover:bg-slate-200"><Icon name="x" size={24}/></button>
                            </div>
                            
                            <div className="p-4 bg-white border-b border-slate-100 shadow-sm z-10 shrink-0">
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                        <Icon name="search" size={16} />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="이름 또는 사번으로 검색" 
                                        value={listSearch}
                                        onChange={(e) => setListSearch(e.target.value)}
                                        className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-incar/20 transition-all"

                            <div className="flex border-b border-slate-200 bg-white shrink-0">

                                    {mode === 'BOARDING' ? `탑승완료 (${doneUsers.length})` : `지급완료 (${doneUsers.length})`}
                                </button>
