            const [isAdminsLoaded, setIsAdminsLoaded] = useState(false);

            const [appBgImage, setAppBgImage] = useState(() => localStorage.getItem('incar_pro_app_bg') || null);
            const [busList, setBusList] = useState(() => { const saved = localStorage.getItem('incar_pro_bus_list'); return saved ? JSON.parse(saved) : ['1호차', '2호차', '3호차']; });
            
            const [scanResult, setScanResult] = useState(null);
            const [selectedSession, setSelectedSession] = useState(null);
            const [targetSessionId, setTargetSessionId] = useState('');
            const [targetBus, setTargetBus] = useState('1호차');
            const [manualBus, setManualBus] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedUser, setSelectedUser] = useState(null);
            const [editForm, setEditForm] = useState({ optKey: '', optVal: '', penalty: 0, reason: '' });
            const [refundRequest, setRefundRequest] = useState(null);
            const [forfeitRequest, setForfeitRequest] = useState(null);
            
            const [db, setDb] = useState(null); 
            const SYSTEM_APP_ID = 'inca-prod-v1';

            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            const processedScansRef = useRef(new Set());

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => { localStorage.setItem('incar_pro_bus_list', JSON.stringify(busList)); }, [busList]);
            useEffect(() => { if (appBgImage) localStorage.setItem('incar_pro_app_bg', appBgImage); else localStorage.removeItem('incar_pro_app_bg'); }, [appBgImage]);

            useEffect(() => {
                const initLocal = () => {
                    setAdmins(JSON.parse(localStorage.getItem('incar_pro_admins') || '[]'));
                    const loadedUsers = JSON.parse(localStorage.getItem('incar_pro_users') || '[]');
                    const loadedSched = JSON.parse(localStorage.getItem('incar_pro_schedules') || '[]');
                    
                    if(loadedUsers.length === 0 && loadedSched.length === 0) {
                        setUsers(defaultUsers);
                        setSchedules(defaultSchedules);
                        localStorage.setItem('incar_pro_users', JSON.stringify(defaultUsers));
                        localStorage.setItem('incar_pro_schedules', JSON.stringify(defaultSchedules));
                    } else {
                        setUsers(loadedUsers);
                        loadedSched.sort((a,b) => {
                            if (a.date === b.date) return (a.order || 0) - (b.order || 0);
                            return a.date > b.date ? 1 : -1;
                        });
                        setSchedules(loadedSched);
                    }
                    
                    setLogs(JSON.parse(localStorage.getItem('incar_pro_logs') || '[]'));
                    setChangeLogs(JSON.parse(localStorage.getItem('incar_pro_changelogs') || '[]'));
                    
                    const scannable = (loadedSched.length > 0 ? loadedSched : defaultSchedules).filter(s => s.type !== 'NONE');
                    if (scannable.length > 0) setTargetSessionId(scannable[0].id);
                    setIsAdminsLoaded(true);
                };
                
                try {
                    const firebaseConfig = { apiKey: "AIzaSyAh1dsSNobeF6Wz-0euP5AUggdqJANJ3dQ", authDomain: "incarpass.firebaseapp.com", projectId: "incarpass", storageBucket: "incarpass.firebasestorage.app", messagingSenderId: "955362361998", appId: "1:955362361998:web:166055dd392784f1827fdf" };
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    const _db = firebase.firestore();
                    
                    _db.enablePersistence({ synchronizeTabs: true })
                        .catch(err => {
                            if (err.code == 'failed-precondition') console.warn("오프라인 모드 활성화 실패: 여러 탭이 열려있습니다.");
                            else if (err.code == 'unimplemented') console.warn("현재 브라우저가 오프라인 모드를 지원하지 않습니다.");
                        });

                    firebase.auth().signInAnonymously().then(() => {
                        setDb(_db);
                        _db.collection('artifacts').doc(SYSTEM_APP_ID).collection('admins').onSnapshot(snap => { setAdmins(snap.docs.map(d => d.data())); setIsAdminsLoaded(true); });
                        _db.collection('artifacts').doc(SYSTEM_APP_ID).collection('schedules').onSnapshot(snap => { 
                            const list = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => {
                                if (a.date === b.date) return (a.order || 0) - (b.order || 0);
                                return a.date > b.date ? 1 : -1;
                            }); 
                            setSchedules(list); 
                            if(list.length > 0 && !targetSessionId) {
                                const scanOnly = list.filter(s => s.type !== 'NONE');
                                if(scanOnly.length > 0) setTargetSessionId(scanOnly[0].id);
                            }
                        });
                        _db.collection('artifacts').doc(SYSTEM_APP_ID).collection('logs').orderBy('timestamp','desc').onSnapshot(snap => setLogs(snap.docs.map(d => ({id:d.id, ...d.data()}))));
                        _db.collection('artifacts').doc(SYSTEM_APP_ID).collection('changelogs').orderBy('timestamp','desc').onSnapshot(snap => setChangeLogs(snap.docs.map(d => ({id:d.id, ...d.data()}))));
                        _db.collection('artifacts').doc(SYSTEM_APP_ID).collection('users').onSnapshot(snap => setUsers(snap.docs.map(d => d.data())));
                    }).catch(e => initLocal());
                } catch (e) { initLocal(); }
            }, []);

            useEffect(() => { if(!db) localStorage.setItem('incar_pro_admins', JSON.stringify(admins)); }, [admins, db]);
            useEffect(() => { if(!db) localStorage.setItem('incar_pro_users', JSON.stringify(users)); }, [users, db]);
            useEffect(() => { if(!db) localStorage.setItem('incar_pro_schedules', JSON.stringify(schedules)); }, [schedules, db]);
            useEffect(() => { if(!db) localStorage.setItem('incar_pro_logs', JSON.stringify(logs)); }, [logs, db]);
            useEffect(() => { if(!db) localStorage.setItem('incar_pro_changelogs', JSON.stringify(changeLogs)); }, [changeLogs, db]);
            
            useEffect(() => {
                logs.forEach(l => {
                    if (l.sessionId && l.uid) GLOBAL_PROCESSED_SCANS.add(`${l.sessionId}_${l.uid}`);
                });
            }, [logs]);

            const handleAppBgUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            let width = img.width;
                            let height = img.height;
                            const MAX = 1920; 
                            if (width > height && width > MAX) { height *= MAX / width; width = MAX; } 
                            else if (height > MAX) { width *= MAX / height; height = MAX; }
                            canvas.width = width; canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            setAppBgImage(canvas.toDataURL('image/jpeg', 0.6));
                        };
                        img.src = evt.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            const exportAllData = () => {
                if(logs.length === 0 && changeLogs.length === 0) return alert("내보낼 데이터가 없습니다.");
                
                const combinedData = [];
                logs.forEach(l => combinedData.push({ rawTime: l.timestamp, 일시: formatDateSafe(l.timestamp), 사번: String(l.uid), 성명: l.name, 구분: l.action, 일정명: l.sessionTitle, 금액: l.finalAmount || 0, 패널티: l.penaltyApplied || 0, 배정수단: l.bus, 비고: '', 처리자: l.processedBy || '시스템' }));
                changeLogs.forEach(c => combinedData.push({ rawTime: c.timestamp, 일시: formatDateSafe(c.timestamp), 사번: String(c.uid), 성명: c.name, 구분: '변경', 일정명: c.targetOption, 금액: 0, 패널티: c.penalty || 0, 배정수단: '', 비고: `${c.oldVal} -> ${c.newVal} | ${c.reason}`, 처리자: c.processedBy || '시스템' }));
                
                combinedData.sort((a, b) => {
                    const tA = new Date(a.rawTime).getTime();
                    const tB = new Date(b.rawTime).getTime();
                    return (isNaN(tB) ? 0 : tB) - (isNaN(tA) ? 0 : tA);
                });
                
                const headers = ['일시', '사번', '성명', '구분', '일정명', '금액', '패널티', '배정수단', '비고', '처리자'];
                let rows = ''; combinedData.forEach(d => { rows += `<tr><td>${d.일시}</td><td style="mso-number-format:'@'">${d.사번}</td><td>${d.성명}</td><td>${d.구분}</td><td>${d.일정명}</td><td>${d.금액}</td><td>${d.패널티}</td><td>${d.배정수단}</td><td>${d.비고}</td><td>${d.처리자}</td></tr>`; });
                const tableHTML = `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta http-equiv="content-type" content="application/vnd.ms-excel; charset=UTF-8"><style>table { border-collapse: collapse; width: 100%; } th, td { border: 1px solid #000; padding: 5px; text-align: center; white-space: nowrap; vertical-align: middle; } th { background-color: #f0f0f0; font-weight: bold; }</style></head><body><h3>[INCARPASS 통합 운영 로그]</h3><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></body></html>`;
                const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `INCARPASS_Unified_Log_${new Date().toISOString().slice(0,10)}.xls`; link.click();
            };

            const handlePartialReset = async () => {
                if(!confirm("⚠️ 경고: 관리자 계정은 유지하고 참가자 명단, 전체 일정, 모든 탑승 및 변경 기록을 삭제합니다. 진행하시겠습니까?")) return;
                try {
                    if(db) {
                        const collections = ['users', 'schedules', 'logs', 'changelogs'];
                        for (const col of collections) {
                            const snapshot = await db.collection('artifacts').doc(SYSTEM_APP_ID).collection(col).get();
                            const batch = db.batch(); snapshot.docs.forEach(doc => batch.delete(doc.ref)); await batch.commit();
                        }
                    } else {
                        localStorage.removeItem('incar_pro_users');
                        localStorage.removeItem('incar_pro_schedules');
                        localStorage.removeItem('incar_pro_logs');
                        localStorage.removeItem('incar_pro_changelogs');
                        setUsers([]); setSchedules([]); setLogs([]); setChangeLogs([]);
                    }
                    GLOBAL_PROCESSED_SCANS.clear();
                    alert("운영 데이터가 비워졌습니다. 이제 새로운 명단과 일정을 업로드하세요.");
                } catch(e) { console.error(e); alert("운영 데이터 초기화 중 오류가 발생했습니다: " + e.message); }
            };

            const handleFullReset = async () => {
                if(!confirm("⛔ 공장 초기화: 로컬 및 서버의 모든 데이터(관리자 계정 포함)가 완전히 삭제됩니다. 진행하시겠습니까?")) return;
                try {
                    if(db) {
                        const collections = ['users', 'schedules', 'logs', 'changelogs', 'admins'];
                        for (const col of collections) {
                            const snapshot = await db.collection('artifacts').doc(SYSTEM_APP_ID).collection(col).get();
                            const batch = db.batch(); snapshot.docs.forEach(doc => batch.delete(doc.ref)); await batch.commit();
                        }
                    }
                    localStorage.clear(); sessionStorage.clear(); alert("시스템이 공장 초기화 되었습니다."); window.location.reload();
                } catch(e) { console.error(e); alert("초기화 중 오류가 발생했습니다: " + e.message); }
            };

            const handleAddAdmin = async (newAdmin) => {
                const isExist = admins.find(a => a.id === newAdmin.id);
                if (isExist) return alert('이미 존재하는 ID입니다.');
                if (db) {
                    await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('admins').doc(newAdmin.id).set(newAdmin);
                } else {
                    setAdmins([...admins, newAdmin]);
                }
                if(newAdmin.role !== 'master') alert('계정이 추가되었습니다.');
            };

            const handleDeleteAdmin = async (id) => {
                if(!confirm('해당 계정을 삭제하시겠습니까?')) return;
                if (db) {
                    await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('admins').doc(id).delete();
                } else {
                    setAdmins(admins.filter(a => a.id !== id));
                }
            };

            const handleUpdateAdminRole = async (id, newRole) => {
                if(!confirm(`해당 계정의 권한을 [${newRole.toUpperCase()}]로 변경하시겠습니까?`)) return;
                if (db) {
                    await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('admins').doc(id).update({ role: newRole });
                } else {
                    setAdmins(admins.map(a => a.id === id ? { ...a, role: newRole } : a));
                }
            };

            const scheduleStats = useMemo(() => {
                return schedules.map(s => {
                    const validUsers = users.filter(u => {
                        const { isTarget, expectedBus } = getUserSessionInfo(u, s);
                        if (!isTarget) return false;
                        if (s.type === 'BOARDING' && ['비탑승', '제외', '-', '미정', ''].includes(expectedBus)) return false;
                        return true;
                    });
                    const targetCount = validUsers.length;
                    const doneCount = logs.filter(l => l.sessionId === s.id && validUsers.some(vu => String(vu.uid) === String(l.uid))).length;
                    const percent = targetCount > 0 ? Math.round((doneCount / targetCount) * 100) : (doneCount > 0 ? 100 : 0);
                    const expectedAmount = targetCount * (s.price || 0);
                    const actualAmount = logs.filter(l => l.sessionId === s.id && validUsers.some(vu => String(vu.uid) === String(l.uid))).reduce((sum, l) => sum + (l.finalAmount || 0), 0);
                    return { ...s, targetCount, doneCount, percent, expectedAmount, actualAmount, diffCount: doneCount - targetCount, diffAmount: actualAmount - expectedAmount };
                });
            }, [schedules, users, logs]);

            const { groupKeys, groupedStats } = useMemo(() => {
                const groups = {};
                const keyOrder = [];
                scheduleStats.forEach(stat => { 
                    const date = stat.displayDate || '기타'; 
                    if(!groups[date]) {
                        groups[date] = []; 
                        keyOrder.push(date);
                    }
                    groups[date].push(stat); 
                });
                return { groupKeys: keyOrder, groupedStats: groups };
            }, [scheduleStats]);

            const cleanupOldLogs = async (uid, targetKey, oldVal, performUpdate = true) => {
                const relatedSessions = schedules.filter(s => s.targetKey === targetKey);
                const logsToDelete = logs.filter(l => String(l.uid) === String(uid) && relatedSessions.some(s => s.id === l.sessionId));
                const oldLogIds = logsToDelete.map(l => l.id);
                if(performUpdate && oldLogIds.length > 0) {
                    if (db) { const batch = db.batch(); oldLogIds.forEach(logId => { const ref = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('logs').doc(logId); batch.delete(ref); }); await batch.commit(); } 
                    else { setLogs(prevLogs => prevLogs.filter(l => !oldLogIds.includes(l.id))); }
                }
                return oldLogIds;
            };

            const handleManualComplete = async (user, session) => {
                const domainInfo = getSessionDomainInfo(session);
                if(!confirm(`${user.name}님을 수동으로 [${domainInfo.label}완료] 처리하시겠습니까?`)) return;
                
                processedScansRef.current.add(`${session.id}_${user.uid}`);

                const newLog = { id: `LOG_${Date.now()}_MANUAL`, timestamp: new Date().toISOString(), uid: String(user.uid), name: user.name, org: user.org, action: session.type === 'PAYMENT' ? '지급' : '탑승', sessionId: session.id, sessionTitle: session.title, bus: '수동처리', amount: session.type === 'PAYMENT' ? session.price : 0, penaltyApplied: 0, finalAmount: session.type === 'PAYMENT' ? session.price : 0, processedBy: `${currentAdmin.name}(${currentAdmin.id})` };
                if(db) { await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('logs').add(newLog); } else { setLogs([newLog, ...logs]); }
                
                if (session.type === 'PAYMENT') {
                    fetch(GOOGLE_SHEET_URL, {
                        method: "POST", mode: "no-cors",
                        body: JSON.stringify({ 
                            type: "meal", 
                            id: "\u200B" + String(user.uid),
                            name: user.name, 
                            action: "APPROVE", 
                            tour: session.title, 
                            time: formatTimeSafe(newLog.timestamp) 
                        })
                    }).catch(console.error);
                }
                
                alert("처리되었습니다.");
            };

            const executeUpdate = async (user, session, requiredChoice, penaltyAmount, reason, payoutOverride = null) => {
                if(!db && !confirm("로컬 모드입니다. 변경사항이 다른 기기에 반영되지 않습니다. 계속하시겠습니까?")) return;
                
                const oldVal = user.options[session.targetKey];
                const logIdsToRemove = await cleanupOldLogs(user.uid, session.targetKey, oldVal, !!db);
                const newPenalty = penaltyAmount;

                GLOBAL_PROCESSED_SCANS.add(`${session.id}_${user.uid}`);

                if(db) { 
                    const userRef = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('users').doc(String(user.uid)); 
                    const updatedOptions = { ...user.options, [session.targetKey]: requiredChoice }; 
                    await userRef.update({ options: updatedOptions, penaltyTotal: (user.penaltyTotal || 0) + newPenalty }); 
                } else { 
                    const updatedUsers = users.map(u => { 
                        if (String(u.uid) === String(user.uid)) { 
                            const newOptions = { ...u.options, [session.targetKey]: requiredChoice }; 
                            return { ...u, options: newOptions, penaltyTotal: (u.penaltyTotal || 0) + newPenalty }; 
                        } 
                        return u; 
                    }); 
                    setUsers([...updatedUsers]); 
                }

                const changeLog = { id: `CHG_${Date.now()}`, timestamp: new Date().toISOString(), uid: String(user.uid), name: user.name, targetOption: session.targetKey, oldVal: oldVal || '미선택', newVal: requiredChoice, penalty: newPenalty, reason: reason, processedBy: `${currentAdmin.name}(${currentAdmin.id})` };
                if(db) await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('changelogs').add(changeLog); 
                else setChangeLogs([changeLog, ...changeLogs]);

                let finalAmount = 0; 
                let penaltyApplied = 0;

                if (session.type === 'PAYMENT') { 
                    if (payoutOverride !== null) { 
                        finalAmount = payoutOverride; 
                        penaltyApplied = 0; 
                    } else { 
                        const baseAmount = session.price; 
                        const deduction = (user.penaltyTotal || 0) + newPenalty; 
                        finalAmount = Math.max(0, baseAmount - deduction); 
                        penaltyApplied = (baseAmount - finalAmount); 
                    } 
                }

                const newLog = { id: `LOG_${Date.now()}_FORCE`, timestamp: new Date().toISOString(), uid: String(user.uid), name: user.name, org: user.org, action: session.type === 'PAYMENT' ? '지급' : '탑승', sessionId: session.id, sessionTitle: session.title, bus: targetBus, amount: session.type === 'PAYMENT' ? session.price : 0, penaltyApplied: penaltyApplied, finalAmount: finalAmount, processedBy: `${currentAdmin.name}(${currentAdmin.id})` };
                
                if(db) { 
                    await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('logs').add(newLog); 
                    if (penaltyApplied > 0) { 
                        const currentPenalty = (user.penaltyTotal || 0) + newPenalty; 
                        const userRef = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('users').doc(String(user.uid)); 
                        await userRef.update({ penaltyTotal: currentPenalty - penaltyApplied }); 
                    } 
                } else { 
                    setLogs(prevLogs => { 
                        const filtered = prevLogs.filter(l => !logIdsToRemove.includes(l.id)); 
                        return [newLog, ...filtered]; 
                    }); 
                    if (penaltyApplied > 0) { 
                        const currentPenalty = (user.penaltyTotal || 0) + newPenalty; 
                        const updatedUsers2 = users.map(u => String(u.uid) === String(user.uid) ? { ...u, penaltyTotal: currentPenalty - penaltyApplied } : u); 
                        setUsers([...updatedUsers2]); 
                    } 
                }
                
                if (session.type === 'PAYMENT') {
                    fetch(GOOGLE_SHEET_URL, {
                        method: "POST", mode: "no-cors",
                        body: JSON.stringify({ 
                            type: "meal", 
                            id: "\u200B" + String(user.uid),
                            name: user.name, 
                            action: "APPROVE", 
                            tour: session.title, 
                            time: formatTimeSafe(newLog.timestamp) 
                        })
                    }).catch(console.error);
                }

                setScanResult(null); 
                setRefundRequest(null); 
                setForfeitRequest(null);
                
                let alertMsg = `${user.name}님의 일정이 [${requiredChoice}]로 변경되고 정상 처리되었습니다.`; 
                if(penaltyAmount > 0) alertMsg += `\n\n⚠️ 미반환 처리: ${CURRENCY}${penaltyAmount}가 패널티로 등록되었습니다.`; 
                else if (reason.includes('반환')) alertMsg += `\n\n✅ 반환 확인: 기존 지급액이 정상적으로 회수되었습니다.`; 
                else if (payoutOverride === 0) alertMsg += `\n\nℹ️ 지급 보류: 기존 일정 비용을 고려하여 이번 지급은 생략되었습니다.`; 
                else alertMsg += `\n(이전 일정에 대한 완료 기록은 삭제되었습니다.)`; 
                
                alert(alertMsg);
            };

            const handleForceUpdateAndProcess = async (user, session, requiredChoice) => {
                if(!db && !confirm("로컬 모드입니다. 변경사항이 다른 기기에 반영되지 않습니다. 계속하시겠습니까?")) return;
                const oldVal = user.options[session.targetKey];
                const oldPaymentSchedules = schedules.filter(s => s.targetKey === session.targetKey && s.targetVal === oldVal && s.type === 'PAYMENT');
                const oldPaymentLogs = logs.filter(l => String(l.uid) === String(user.uid) && oldPaymentSchedules.some(s => s.id === l.sessionId));
                const recoupAmount = oldPaymentLogs.reduce((sum, l) => sum + (l.finalAmount || 0), 0);
                
                if (recoupAmount > 0) { 
                    setScanResult(null); 
                    setRefundRequest({ user, session, requiredChoice, amount: recoupAmount, oldVal }); 
                    return; 
                } 
                
                const oldBoardingSchedules = schedules.filter(s => s.targetKey === session.targetKey && s.targetVal === oldVal && s.type === 'BOARDING');
                const isFromTour = oldBoardingSchedules.length > 0;
                const isToPayment = session.type === 'PAYMENT' && session.price > 0;
                
                if (isFromTour && isToPayment) { 
                    setScanResult(null); 
                    setForfeitRequest({ user, session, requiredChoice, oldVal, price: session.price }); 
                    return; 
                }
                
                await executeUpdate(user, session, requiredChoice, 0, '현장 스캔 시 즉시 변경');
            };

            const resolveRefundRequest = async (isReturned) => { 
                if (!refundRequest) return; 
                const { user, session, requiredChoice, amount } = refundRequest; 
                if (isReturned) await executeUpdate(user, session, requiredChoice, 0, `현장 변경 (기존 지급액 ${CURRENCY}${amount} 현장 반환)`); 
                else await executeUpdate(user, session, requiredChoice, amount, `현장 변경 (기존 지급액 ${CURRENCY}${amount} 미반환/패널티)`); 
            };

            const resolveForfeitRequest = async (shouldPay) => { 
                if (!forfeitRequest) return; 
                const { user, session, requiredChoice, oldVal } = forfeitRequest; 
                if (shouldPay) await executeUpdate(user, session, requiredChoice, 0, '현장 변경 (관광->지급, 위약금 면제 및 정상지급)'); 
                else await executeUpdate(user, session, requiredChoice, 0, `현장 변경 (관광->지급, 예약부도 위약금 적용으로 지급생략)`, 0); 
            };

            const handleUserUpload = async (e) => { 
                const file = e.target.files[0]; 
                if (!file) return; 
                
                Papa.parse(file, { 
                    header: false, 
                    skipEmptyLines: true, 
                    complete: async (results) => { 
                        const data = results.data;
                        if(data.length < 2) return alert("데이터가 부족합니다.");
                        
                        const headers = data[0];
                        const parsed = [];
                        
                        for(let i=1; i<data.length; i++) {
                            const row = data[i];
                            let uid = ''; let name = ''; let org = '-'; let bus = '미정';
                            const options = {};
                            
                            headers.forEach((headerName, index) => {
                                const h = headerName ? headerName.trim() : '';
                                const val = row[index] ? row[index].trim() : '';
                                
                                if (['사번','ID','uid'].includes(h) && !uid) uid = val;
                                else if (['성명','이름','Name'].includes(h) && !name) name = val;
                                else if (['소속','부서','Org'].includes(h) && org === '-') org = val;
                                else if (['버스','탑승버스','Bus'].includes(h) && bus === '미정') bus = val;
                                else if (h && val) {
                                    let keyName = h;
                                    let counter = 1;
                                    while(options[keyName] !== undefined) {
                                        keyName = `${h}_${counter}`;
                                        counter++;
                                    }
                                    options[keyName] = val;
                                }
                            });
                            
                            if (bus !== '미정' && bus !== '' && !bus.includes('호차')) {
                                bus = bus + '호차';
                            }
                            
                            if (uid) parsed.push({ uid: String(uid), name, org, bus, options, penaltyTotal: 0 });
                        }
                        
                        if(confirm(`${parsed.length}명의 참가자 명단을 로드하시겠습니까?`)) { 
                            if (db) { 
                                const batch = db.batch(); 
                                parsed.forEach(u => { const ref = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('users').doc(String(u.uid)); batch.set(ref, u); }); 
                                await batch.commit(); 
                                alert("서버 업로드 완료!"); 
                            } else { 
                                setUsers(parsed); 
                                alert("로컬 로드 완료!"); 
                            } 
                        } 
                    } 
                }); 
            };

            const handleScheduleUpload = async (e) => { 
                const file = e.target.files[0]; 
                if (!file) return; 
                Papa.parse(file, { 
                    header: true, 
                    skipEmptyLines: true, 
                    complete: async (results) => { 
                        const parsed = results.data.map((row, idx) => { 
                            const rawDate = row['일정'] || row['Date'] || `Day ${idx+1}`; 
                            const today = new Date(); 
                            const dateObj = new Date(today); 
                            if(rawDate.includes('1일')) dateObj.setDate(today.getDate()); 
                            else if(rawDate.includes('2일')) dateObj.setDate(today.getDate()+1); 
                            else if(rawDate.includes('3일')) dateObj.setDate(today.getDate()+2); 
                            else if(rawDate.includes('4일')) dateObj.setDate(today.getDate()+3); 
                            const dateStr = dateObj.toISOString().split('T')[0]; 
                            let rawPrice = row['지급'] || row['Price'] || '0'; 
                            if (typeof rawPrice === 'string') rawPrice = rawPrice.replace(/[$,\s]/g, ''); 
                            const price = parseInt(rawPrice) || 0; 
                            const title = row['장소'] || row['Title'] || '일정';

                            let type = 'BOARDING'; 
                            if (price > 0) type = 'PAYMENT'; 
                            else if (row['타입'] && (row['타입'].includes('지급') || row['타입'].includes('Payment'))) type = 'PAYMENT'; 
                            else if (row['타입'] && (row['타입'].includes('자유') || row['타입'].includes('안내') || row['타입'].includes('None'))) type = 'NONE';
                            else if (row['타입'] && row['타입'].includes('집합')) type = 'BOARDING';
                            else if (title.includes('자유') || title.includes('휴식') || title.includes('개인') || title.includes('안내')) type = 'NONE';
                            
                            const orderVal = row['순서'] || row['Order'] || row['order'];
                            const order = orderVal !== undefined && orderVal !== '' ? parseInt(orderVal, 10) : idx;

                            return { 
                                id: `SCHED_${String(idx).padStart(4, '0')}`,
                                order: order, 
                                date: dateStr, 
                                displayDate: rawDate, 
                                title: title, 
                                type: type, 
                                price: price, 
                                targetKey: row['타겟옵션'] || row['OptionKey'] || 'ALL', 
                                targetVal: row['타겟값'] || row['OptionVal'] || 'ALL' 
                            }; 
                        }); 
                        
                        if(confirm(`${parsed.length}개의 일정을 로드하시겠습니까?\n(로딩 후 설정에서 '일정 속성'을 확인하세요)`)) { 
                            if (db) { 
                                const batch = db.batch(); 
                                parsed.forEach(s => { const ref = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('schedules').doc(s.id); batch.set(ref, s); }); 
                                await batch.commit(); 
                                alert("서버 업로드 완료!"); 
                            } else { 
                                setSchedules(parsed); 
                                const scanOnly = parsed.filter(s => s.type !== 'NONE');
                                if(scanOnly.length > 0) setTargetSessionId(scanOnly[0].id); 
                                alert("로컬 로드 완료!"); 
                            } 
                        } 
                    } 
                }); 
            };
            
            const processScan = useCallback(async (scannedText, strictMode = false) => { 
                let scannedUid = scannedText;
                if (scannedText.includes('eid=')) {
                    scannedUid = scannedText.split('eid=')[1].split('&')[0];
                } else if (scannedText.includes('uid=')) {
                    scannedUid = scannedText.split('uid=')[1].split('&')[0];
                } else if (scannedText.includes('_')) {
                    scannedUid = scannedText.split('_')[0]; 
                }
                scannedUid = String(scannedUid).trim(); 

                let user = users.find(u => String(u.uid) === String(scannedUid)); 
                if (!user) user = users.find(u => scannedText.includes(String(u.uid))); 

                if (!user) return setScanResult({ status: 'error', msg: '미등록 참가자', subMsg: `스캔된 값: ${scannedText}` }); 
                
                const session = schedules.find(s => s.id === targetSessionId); 
                if (!session) return setScanResult({ status: 'error', msg: '세션 미선택', subMsg: '관리자에게 문의하세요' }); 

                const { isTarget, expectedBus } = getUserSessionInfo(user, session);

                if (!isTarget) {
                     return setScanResult({ status: 'error', msg: '대상자 아님', subMsg: '해당 일정에 신청되지 않은 참가자입니다.', user, session, requiredChoice: session.targetVal !== 'ALL' ? session.targetVal : session.title });
                }

                if (session.type === 'BOARDING' && ['비탑승', '제외', '-', '미정', ''].includes(expectedBus)) {
                     return setScanResult({ status: 'error', msg: '탑승 대상 아님', subMsg: `해당 일정은 [${expectedBus}] 대상자입니다.`, user, session });
                }

                if (strictMode && session.type === 'BOARDING') {
                    if (expectedBus.trim() !== targetBus.trim()) {
                         return setScanResult({ status: 'error', msg: '탑승 불가 (차량 불일치)', subMsg: `배정: ${expectedBus} / 현재: ${targetBus}`, user, session });
                    }
                }
                
                const scanKey = `${session.id}_${user.uid}`;
                if (GLOBAL_PROCESSED_SCANS.has(scanKey)) {
                    return setScanResult({ status: 'duplicate', msg: '이미 처리됨', subMsg: `${session.displayDate} - ${session.title}`, user, session }); 
                }

                const isDuplicate = logs.some(l => String(l.uid) === String(user.uid) && l.sessionId === session.id); 
                if (isDuplicate) return setScanResult({ status: 'duplicate', msg: '이미 처리됨', subMsg: `${session.displayDate} - ${session.title}`, user, session }); 
                
                GLOBAL_PROCESSED_SCANS.add(scanKey);

                let finalAmount = 0; let penaltyApplied = 0; 
                if (session.type === 'PAYMENT') { 
                    const baseAmount = session.price; const deduction = user.penaltyTotal || 0; 
                    finalAmount = Math.max(0, baseAmount - deduction); penaltyApplied = (baseAmount - finalAmount); 
                } 
                
                const newLog = { 
                    id: `LOG_${Date.now()}_${Math.random().toString(36).substr(2,9)}`, timestamp: new Date().toISOString(), uid: String(user.uid), name: user.name, org: user.org, action: session.type === 'PAYMENT' ? '지급' : '탑승', sessionId: session.id, sessionTitle: session.title, bus: session.type === 'BOARDING' ? targetBus : '-', amount: session.type === 'PAYMENT' ? session.price : 0, penaltyApplied: penaltyApplied, finalAmount: finalAmount, processedBy: `${currentAdmin.name}(${currentAdmin.id})`
                }; 
                
                if (db) { 
                    await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('logs').add(newLog); 
                    if (penaltyApplied > 0) { 
                        const userRef = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('users').doc(String(user.uid)); 
                        await userRef.update({ penaltyTotal: user.penaltyTotal - penaltyApplied }); 
                    } 
                } else { 
                    setLogs(prev => [newLog, ...prev]); 
                    if (penaltyApplied > 0) { 
                        setUsers(prev => prev.map(u => String(u.uid) === String(user.uid) ? { ...u, penaltyTotal: u.penaltyTotal - penaltyApplied } : u)); 
                    } 
                } 
                
                if (session.type === 'PAYMENT') {
                    fetch(GOOGLE_SHEET_URL, {
                        method: "POST", mode: "no-cors",
                        body: JSON.stringify({ 
                            type: "meal", 
                            id: "\u200B" + String(user.uid),
                            name: user.name, 
                            action: "APPROVE", 
                            tour: session.title, 
                            time: formatTimeSafe(newLog.timestamp) 
                        })
                    }).catch(console.error);
                }

                const todayLogs = logs.filter(l => String(l.uid) === String(user.uid) && l.timestamp.slice(0, 10) === newLog.timestamp.slice(0, 10) && l.action === '지급'); 
                setScanResult({ status: 'success', msg: session.type==='PAYMENT'?'지급 완료':getSessionDomainInfo(session).label+' 완료', subMsg: session.title, user, logs: newLog, relatedLogs: todayLogs, session }); 
            }, [db, users, schedules, logs, targetSessionId, targetBus, currentAdmin]);

            const handleUserUpdate = async (overridePenalty = null, overrideReason = null) => { 
                if (!selectedUser || !editForm.optKey) return; 
                const oldVal = selectedUser.options[editForm.optKey]; 
                const logIdsToRemove = await cleanupOldLogs(selectedUser.uid, editForm.optKey, oldVal, !!db); 
                
                const newPenalty = overridePenalty !== null ? overridePenalty : parseInt(editForm.penalty || 0); 
                const finalReason = overrideReason !== null ? overrideReason : editForm.reason;

                const changeLog = { id: `CHG_${Date.now()}`, timestamp: new Date().toISOString(), uid: String(selectedUser.uid), name: selectedUser.name, targetOption: editForm.optKey, oldVal: oldVal, newVal: editForm.optVal, penalty: newPenalty, reason: finalReason, processedBy: `${currentAdmin.name}(${currentAdmin.id})` }; 
                
                if (db) { 
                    const userRef = db.collection('artifacts').doc(SYSTEM_APP_ID).collection('users').doc(String(selectedUser.uid)); 
                    await userRef.update({ options: { ...selectedUser.options, [editForm.optKey]: editForm.optVal }, penaltyTotal: (selectedUser.penaltyTotal || 0) + newPenalty }); 
                    await db.collection('artifacts').doc(SYSTEM_APP_ID).collection('changelogs').add(changeLog); 
                } else { 
                    if(logIdsToRemove.length > 0) setLogs(prevLogs => prevLogs.filter(l => !logIdsToRemove.includes(l.id))); 
                    const totalPenalty = (selectedUser.penaltyTotal || 0) + newPenalty;
                    setUsers(users.map(u => String(u.uid) === String(selectedUser.uid) ? { ...u, options: { ...u.options, [editForm.optKey]: editForm.optVal }, penaltyTotal: totalPenalty } : u)); 
                    setSelectedUser({...selectedUser, options: { ...selectedUser.options, [editForm.optKey]: editForm.optVal }, penaltyTotal: totalPenalty});
                    setChangeLogs([changeLog, ...changeLogs]); 
                } 
                alert("변경 및 패널티 적용이 완료되었습니다."); 
                setEditForm({ optKey: '', optVal: '', penalty: 0, reason: '' }); 
                setSearchQuery(''); 
            };

            return (
                <div className={`w-full h-full flex flex-col md:flex-row relative overflow-hidden ${appBgImage ? 'bg-cover bg-center' : 'bg-slate-50'}`} style={appBgImage ? {backgroundImage: `url(${appBgImage})`} : {}}>
                    {!currentAdmin ? (
                        <AuthView admins={admins} onLogin={setCurrentAdmin} onSetup={handleAddAdmin} isLoaded={isAdminsLoaded} />
                    ) : (
                        <>
                            {appBgImage && <div className="absolute inset-0 z-0 bg-slate-900/40 backdrop-blur-[2px]"></div>}
                            
                            <div className="z-10 h-full hidden md:block shrink-0">
                                <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} currentAdmin={currentAdmin} />
                            </div>
                            
                            <main className="flex-1 flex flex-col h-full overflow-hidden relative w-full z-10 min-w-0 min-h-0">
                                { window.innerWidth < 768 && <header className="bg-white/90 px-6 py-4 shadow-sm flex justify-between items-center z-20 shrink-0"><div className="flex items-center gap-2"><div className="w-8 h-8 bg-incar rounded-lg flex items-center justify-center text-white font-black">P</div><h1 className="font-black text-slate-800 tracking-tight">INCARPASS <span className="text-incar text-[10px] px-1.5 py-0.5 bg-indigo-50 rounded-md align-top">PRO</span></h1></div><div className="flex items-center gap-3"><div className="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200">{currentAdmin.name}</div><button onClick={() => { sessionStorage.removeItem('incar_pro_admin'); localStorage.removeItem('incar_pro_admin'); window.location.reload(); }} className="text-slate-400 p-2"><Icon name="logOut" size={20}/></button></div></header>}
                                
                                <div className="flex-1 overflow-y-auto p-4 pb-32 md:pb-8 md:p-8 w-full h-full z-10 custom-scrollbar min-h-0">
                                    <div className="max-w-5xl mx-auto w-full">
                                        {activeTab === 'dashboard' && <DashboardView users={users} logs={logs} scheduleStats={scheduleStats} groupedStats={groupedStats} groupKeys={groupKeys} changeLogs={changeLogs} onSessionClick={setSelectedSession} />}
                                        {activeTab === 'boarding' && <ScanView mode="BOARDING" schedules={schedules} targetSessionId={targetSessionId} setTargetSessionId={setTargetSessionId} targetBus={targetBus} setTargetBus={setTargetBus} manualBus={manualBus} setManualBus={setManualBus} isScanning={isScanning} setIsScanning={setIsScanning} processScan={processScan} users={users} isMobile={isMobile} busList={busList} setBusList={setBusList} scanResult={scanResult} />}
                                        {activeTab === 'payment' && <ScanView mode="PAYMENT" schedules={schedules} targetSessionId={targetSessionId} setTargetSessionId={setTargetSessionId} targetBus={targetBus} setTargetBus={setTargetBus} manualBus={manualBus} setManualBus={setManualBus} isScanning={isScanning} setIsScanning={setIsScanning} processScan={processScan} users={users} isMobile={isMobile} busList={busList} setBusList={setBusList} scanResult={scanResult} />}
                                        {activeTab === 'change' && <ChangeView searchQuery={searchQuery} setSearchQuery={setSearchQuery} selectedUser={selectedUser} setSelectedUser={setSelectedUser} editForm={editForm} setEditForm={setEditForm} handleUserUpdate={handleUserUpdate} users={users} schedules={schedules} changeLogs={changeLogs} logs={logs} />}
                                        {activeTab === 'manage' && <ManageView users={users} handleUserUpload={handleUserUpload} handleScheduleUpload={handleScheduleUpload} exportAllData={exportAllData} handleFullReset={handleFullReset} handlePartialReset={handlePartialReset} schedules={schedules} setSchedules={setSchedules} logs={logs} appBgImage={appBgImage} setAppBgImage={setAppBgImage} handleAppBgUpload={handleAppBgUpload} db={db} SYSTEM_APP_ID={SYSTEM_APP_ID} admins={admins} handleAddAdmin={handleAddAdmin} handleDeleteAdmin={handleDeleteAdmin} handleUpdateAdminRole={handleUpdateAdminRole} currentAdmin={currentAdmin} />}
                                    </div>
                                </div>
                                
                                { window.innerWidth < 768 && <MobileTab activeTab={activeTab} setActiveTab={setActiveTab} currentAdmin={currentAdmin} /> }
                                
                                {selectedSession && <SessionDetailModal session={selectedSession} users={users} logs={logs} onClose={() => setSelectedSession(null)} onManualComplete={handleManualComplete} />}
                                {refundRequest && (<div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm animate-fade-in"><div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl animate-slide-up"><div className="bg-rose-50 p-6 text-center border-b border-rose-100"><div className="w-16 h-16 bg-white text-rose-500 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm text-2xl font-bold">{CURRENCY}</div><h3 className="text-xl font-black text-rose-600 mb-1 break-keep">지급금 반환 필요</h3><p className="text-slate-600 font-bold text-sm break-keep">{refundRequest.user.name}님은<br/>이미 <span className="text-rose-600 underline">{CURRENCY}{refundRequest.amount}</span>을 지급받았습니다.</p></div><div className="p-6 space-y-4"><div className="text-center text-xs text-slate-400 mb-2 break-keep">기존 일정: {refundRequest.oldVal} <br/>▼ <br/>변경 일정: {refundRequest.session.title}</div><button onClick={() => resolveRefundRequest(true)} className="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep"><span>반환 받았습니다</span><span className="text-[10px] opacity-80 font-normal">(패널티 없음)</span></button><button onClick={() => resolveRefundRequest(false)} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep"><span>반환받지 못했습니다</span><span className="text-[10px] opacity-80 font-normal">(미반환금 패널티 처리)</span></button><button onClick={() => setRefundRequest(null)} className="w-full py-3 text-slate-400 font-bold text-sm hover:bg-slate-50 rounded-xl break-keep">취소</button></div></div></div>)}
                                {forfeitRequest && (<div className="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm animate-fade-in"><div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl animate-slide-up"><div className="bg-indigo-50 p-6 text-center border-b border-indigo-100"><div className="w-16 h-16 bg-white text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm text-2xl font-bold">?</div><h3 className="text-xl font-black text-indigo-900 mb-1 break-keep">일정 변경 확인 (Case 2)</h3><p className="text-slate-600 font-bold text-sm break-keep">예약된 관광 코스를 취소하고<br/>현금 지급 일정으로 변경합니다.</p></div><div className="p-6 space-y-4"><div className="text-center text-xs text-slate-400 mb-2 break-keep">기존: {forfeitRequest.oldVal} (예약취소)<br/>▼ <br/>변경: {forfeitRequest.session.title} (지급 {CURRENCY}{forfeitRequest.price})</div><button onClick={() => resolveForfeitRequest(false)} className="w-full py-4 bg-rose-500 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep"><span>부지급 (위약금 적용)</span><span className="text-[10px] opacity-80 font-normal">(예약 비용 패널티로 상계 처리)</span></button><button onClick={() => resolveForfeitRequest(true)} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep"><span>정상 지급</span><span className="text-[10px] opacity-80 font-normal">({CURRENCY}{forfeitRequest.price} 지급 승인)</span></button><button onClick={() => setForfeitRequest(null)} className="w-full py-3 text-slate-400 font-bold text-sm hover:bg-slate-50 rounded-xl break-keep">취소</button></div></div></div>)}
                            </main>
                            
                            <ResultModal result={scanResult} onClose={() => setScanResult(null)} onForceUpdate={handleForceUpdateAndProcess} currentAdmin={currentAdmin} />
                        </>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
