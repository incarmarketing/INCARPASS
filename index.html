<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>INCARPASS PRO - Field Operations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        incar: '#27398C', 'incar-dark': '#1a2b6d', 'incar-light': '#eef2ff',
                        success: '#10b981', warning: '#f59e0b', danger: '#ef4444'
                    },
                    boxShadow: { 'card': '0 4px 20px rgba(39, 57, 140, 0.08)' },
                    fontFamily: { 'sans': ['Noto Sans KR', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; color: #334155; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .scan-line { width: 100%; height: 2px; background: #ef4444; position: absolute; top: 0; left: 0; animation: scan 2s infinite linear; z-index: 20; box-shadow: 0 0 4px #ef4444; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        
        .pc-only { display: none; }
        @media (min-width: 768px) { .pc-only { display: block; } }
        
        .data-table th { background-color: #f8fafc; color: #64748b; font-weight: 700; font-size: 0.75rem; padding: 12px 16px; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
        .data-table td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; font-weight: 500; }
        .data-table tr:hover td { background-color: #f8fafc; }

        .scanner-container { position: relative; width: 100%; max-width: 320px; aspect-ratio: 1 / 1; background: #000; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 4px solid rgba(255, 255, 255, 0.1); }
        #reader, #lookup-reader { width: 100% !important; height: 100% !important; position: absolute !important; top: 0; left: 0; border: none !important; }
        #reader video, #lookup-reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; border-radius: 1.2rem; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;
        const CURRENCY = '$';

        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbx2tVkT00Z8uXQWl6EeTIUUhZ3_NJHx3JDqSCHC5oJWkUCm0OtcTmaV6g20cNKoh0no9w/exec";

        const GLOBAL_PROCESSED_SCANS = new Set();

        const getSessionDomainInfo = (session) => {
            if (!session) return { isFlight: false, label: '탑승', icon: 'bus', isOutbound: false, isInbound: false };
            const isFlight = session.title && (session.title.includes('아시아나') || session.title.includes('대한항공') || session.title.includes('항공') || session.title.includes('공항'));
            let label = '탑승';
            let isOutbound = false;
            let isInbound = false;
            if (session.type === 'PAYMENT') label = '지급';
            else if (session.type === 'NONE') label = '안내';
            else if (isFlight) {
                isOutbound = session.displayDate && session.displayDate.includes('1일차');
                isInbound = !isOutbound;
                label = isOutbound ? '출국' : '탑승'; 
            }
            return { isFlight, label, icon: isFlight ? 'plane' : 'bus', isOutbound, isInbound };
        };

        const formatTimeSafe = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            if (isNaN(d.getTime())) {
                const parts = ts.split(' ');
                return parts.length >= 2 ? parts.slice(-2).join(' ') : ts;
            }
            return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        };

        const formatDateSafe = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            if (isNaN(d.getTime())) return ts;
            return `${d.getMonth()+1}/${d.getDate()} ${formatTimeSafe(ts)}`;
        };

        const cleanOptionKey = (key) => {
            if (!key) return key;
            return key.replace(/_\d+$/, ''); 
        };

        const defaultSchedules = [
            { id: 'S01', order: 1, date: '2026-03-11', displayDate: '1일차 13:30', title: '아시아나', type: 'BOARDING', targetKey: '아시아나', targetVal: '아시아나' },
            { id: 'S02', order: 2, date: '2026-03-11', displayDate: '1일차 14:00', title: '대한항공', type: 'BOARDING', targetKey: '대한항공', targetVal: '대한항공' },
            { id: 'S03', order: 3, date: '2026-03-11', displayDate: '1일차 14:30', title: '타이베이 101 전망대', type: 'BOARDING', targetKey: 'ALL', targetVal: 'ALL' }
        ];

        const defaultUsers = [
            { uid: '10001', name: '홍길동', org: '강남지사', bus: '1호차', options: { '항공': '아시아나' }, penaltyTotal: 0 },
            { uid: '10002', name: '김철수', org: '본사', bus: '1호차', options: { '항공': '대한항공' }, penaltyTotal: 0 }
        ];

        const getUserSessionInfo = (user, session) => {
            if (!user) return { isTarget: false, expectedBus: '미정' };
            if (!session) return { isTarget: false, expectedBus: user.bus || '미정' };
            
            let isTarget = false; let expectedBus = '미정'; let matchedKey = null;

            const targetVals = session.targetVal !== 'ALL' ? session.targetVal.split(',').map(s => s.trim()) : [];

            for (const key of Object.keys(user.options)) {
                if (key.includes('버스')) continue;
                const val = user.options[key];
                if (typeof val === 'string') {
                    if (val.includes(session.title) || 
                       (session.targetVal !== 'ALL' && targetVals.some(tv => val.includes(tv))) ||
                       (session.targetKey !== 'ALL' && val.includes(session.targetKey))) {
                        isTarget = true; matchedKey = key; break;
                    }
                }
            }
            
            if (!isTarget && session.targetKey && session.targetKey !== 'ALL') {
                const userVal = user.options[session.targetKey];
                if (session.targetVal === 'ALL') {
                    if(!!userVal) { isTarget = true; matchedKey = session.targetKey; }
                } else if (userVal) {
                    if(targetVals.some(tv => userVal.includes(tv))) {
                        isTarget = true; matchedKey = session.targetKey;
                    }
                }
            }
            
            if (!isTarget && session.targetKey === 'ALL') isTarget = true;
            
            let foundSpecificBus = false;
            
            const domainInfo = getSessionDomainInfo(session);
            if (domainInfo.isOutbound && user.options['항공']) {
                expectedBus = user.options['항공'].trim();
                foundSpecificBus = true;
            }

            if (!foundSpecificBus && session.displayDate) {
                const dayMatch = session.displayDate.match(/(\d+일차)/);
                if (dayMatch) {
                    const dayStr = dayMatch[1]; 
                    if (user.options[`${dayStr}버스`]) {
                        expectedBus = user.options[`${dayStr}버스`].trim();
                        foundSpecificBus = true;
                    } else if (user.options[`${dayStr} 버스`]) {
                        expectedBus = user.options[`${dayStr} 버스`].trim();
                        foundSpecificBus = true;
                    }
                }
            }

            if (!foundSpecificBus) {
                if (matchedKey && user.options[`${matchedKey} 버스`]) expectedBus = user.options[`${matchedKey} 버스`].trim();
                else if (user.bus && user.bus !== '미정') expectedBus = user.bus;
                else if (user.options['버스']) expectedBus = user.options['버스'];
                else if (user.options['탑승버스']) expectedBus = user.options['탑승버스'];
            }

            if (expectedBus !== '미정' && expectedBus !== '-' && !expectedBus.includes('호차') && !isNaN(parseInt(expectedBus))) {
                expectedBus += '호차';
            }

            return { isTarget, expectedBus };
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                dashboard: <path d="M3 3h7v7H3V3m11 0h7v7h-7V3m0 11h7v7h-7v-7M3 14h7v7H3v-7"/>,
                qr: <path d="M3 7V3h4M3 17v4h4M17 3h4v4M21 17v-4h4m-4 4h-4M7 11h2v2H7v-2m4 0h2v2h-2v-2m4 0h2v2h-2v-2"/>,
                users: <g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></g>,
                money: <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>,
                edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
                settings: <g><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></g>,
                check: <polyline points="20 6 9 17 4 12"/>,
                x: <g><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></g>,
                alert: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></g>,
                history: <g><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></g>,
                download: <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></g>,
                table: <g><path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 0 2 2h7m0-18v18"/></g>,
                bus: <g><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/></g>,
                plane: <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21.5 4c0 0-2 .5-3.5 2L14.5 9.5 6.3 7.7a1 1 0 0 0-1.2.5l-1.5 1.5c-.3.3-.3.8 0 1.1L8.2 13l-3.5 3.5-2.2-.7a1 1 0 0 0-1 .3L.5 17a1 1 0 0 0 0 1.1L4.3 22l3.8 3.8a1 1 0 0 0 1.1 0l1-1a1 1 0 0 0 .3-1l-.7-2.2L13 18.2l2.2 4.7a1 1 0 0 0 1.1 0l1.5-1.5a1 1 0 0 0 .5-1.2z"/>,
                trash: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></g>,
                plus: <g><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></g>,
                up: <g><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></g>,
                down: <g><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></g>,
                chevronsDown: <g><polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/></g>,
                image: <g><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></g>,
                info: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></g>,
                save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
                search: <g><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></g>,
                lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></g>,
                logOut: <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></g>,
                shield: <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></g>,
                user: <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
                alertTriangle: <g><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></g>,
                refresh: <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || <circle cx="12" cy="12" r="2"/>}</svg>;
        };

        const Sidebar = ({ activeTab, setActiveTab, currentAdmin }) => {
            const roleName = currentAdmin?.role === 'master' ? 'MASTER' : currentAdmin?.role === 'manager' ? 'MANAGER' : 'STAFF';
            const roleColor = currentAdmin?.role === 'master' ? 'text-amber-500' : currentAdmin?.role === 'manager' ? 'text-indigo-500' : 'text-emerald-500';
            
            return (
                <aside className="w-64 bg-white/95 backdrop-blur-md h-full border-r border-slate-200 flex flex-col shadow-lg z-30 hidden md:flex relative shrink-0">
                    <div className="p-6 border-b border-slate-100 flex items-center gap-3">
                        <div className="w-8 h-8 bg-incar rounded-lg flex items-center justify-center text-white font-black">P</div>
                        <h1 className="font-black text-slate-800 tracking-tight">INCARPASS <span className="text-incar text-[10px] px-1.5 py-0.5 bg-indigo-50 rounded-md align-top">PRO</span></h1>
                    </div>
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
                        {[{id:'dashboard', icon:'dashboard', label:'현황 (Status)', roles: ['master', 'manager', 'staff']},
                          {id:'boarding', icon:'bus', label:'탑승 (Boarding)', roles: ['master', 'manager', 'staff']},
                          {id:'payment', icon:'money', label:'지급 (Payment)', roles: ['master', 'manager', 'staff']},
                          {id:'change', icon:'edit', label:'관리 (Change)', roles: ['master', 'manager']},
                          {id:'manage', icon:'settings', label:'설정 (Settings)', roles: ['master', 'manager']}
                        ].filter(menu => menu.roles.includes(currentAdmin?.role)).map(menu => (
                            <button key={menu.id} onClick={()=>setActiveTab(menu.id)} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold transition-all ${activeTab===menu.id ? 'bg-incar text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}`}>
                                <Icon name={menu.icon} /> {menu.label}
                            </button>
                        ))}
                    </nav>
                    <div className="p-4 border-t border-slate-100 bg-slate-50">
                        <div className="mb-3 px-2 flex flex-col">
                            <span className={`text-[10px] font-black ${roleColor}`}>{roleName}</span>
                            <span className="text-sm font-bold text-slate-700 truncate">{currentAdmin?.name}</span>
                        </div>
                        <button onClick={() => { sessionStorage.removeItem('incar_pro_admin'); localStorage.removeItem('incar_pro_admin'); window.location.reload(); }} className="w-full flex items-center justify-center gap-2 p-3 bg-white rounded-xl border border-slate-200 font-bold text-slate-500 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-100 transition-all shadow-sm">
                            <Icon name="logOut" size={16} /> 로그아웃
                        </button>
                    </div>
                </aside>
            );
        };

        const MobileTab = ({ activeTab, setActiveTab, currentAdmin }) => (
            <nav className="fixed bottom-0 w-full bg-white border-t border-slate-200 pb-safe pt-2 px-4 flex justify-around items-center z-30 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] md:hidden">
                <button onClick={()=>setActiveTab('dashboard')} className={`flex flex-col items-center gap-1 p-2 w-14 ${activeTab==='dashboard'?'text-incar':'text-slate-300'}`}><Icon name="dashboard" size={20}/><span className="text-[9px] font-bold">현황</span></button>
                <button onClick={()=>setActiveTab('boarding')} className={`flex flex-col items-center gap-1 p-2 w-14 relative ${activeTab==='boarding'?'text-incar':'text-slate-300'}`}><div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${activeTab==='boarding'?'bg-incar text-white shadow-lg ring-2 ring-slate-100 mb-1':''}`}><Icon name="bus" size={20} /></div>{activeTab!=='boarding' && <span className="text-[9px] font-bold">탑승</span>}</button>
                <button onClick={()=>setActiveTab('payment')} className={`flex flex-col items-center gap-1 p-2 w-14 relative ${activeTab==='payment'?'text-emerald-500':'text-slate-300'}`}><div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${activeTab==='payment'?'bg-emerald-500 text-white shadow-lg ring-2 ring-slate-100 mb-1':''}`}><Icon name="money" size={20} /></div>{activeTab!=='payment' && <span className="text-[9px] font-bold">지급</span>}</button>
                {currentAdmin?.role !== 'staff' && <button onClick={()=>setActiveTab('change')} className={`flex flex-col items-center gap-1 p-2 w-14 ${activeTab==='change'?'text-incar':'text-slate-300'}`}><Icon name="edit" size={20}/><span className="text-[9px] font-bold">관리</span></button>}
                {currentAdmin?.role !== 'staff' && <button onClick={()=>setActiveTab('manage')} className={`flex flex-col items-center gap-1 p-2 w-14 ${activeTab==='manage'?'text-incar':'text-slate-300'}`}><Icon name="settings" size={20}/><span className="text-[9px] font-bold">설정</span></button>}
            </nav>
        );

        const QRCodeCanvas = ({ text, size = 100, transparent = false, id }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (canvasRef.current && window.QRious) {
                    new QRious({ element: canvasRef.current, value: text, size: size, level: 'H', background: transparent ? 'transparent' : 'white', foreground: 'black' });
                }
            }, [text, size, transparent]);
            return <canvas ref={canvasRef} id={id} />;
        };

        const ResultModal = ({ result, onClose, onForceUpdate, currentAdmin }) => {
            if (!result) return null;
            const { status, msg, subMsg, user, logs, relatedLogs, requiredChoice, session } = result;
            const isSuccess = status === 'success';
            const isDuplicate = status === 'duplicate';
            const isTargetMismatch = status === 'error' && msg === '대상자 아님';
            const isBusMismatch = status === 'error' && msg === '탑승 불가 (차량 불일치)';
            
            const domainInfo = getSessionDomainInfo(session);
            
            useEffect(() => { 
                if(isSuccess || isDuplicate || isBusMismatch) { 
                    const timer = setTimeout(() => {
                        onClose();
                    }, 1500); 
                    return () => clearTimeout(timer); 
                } 
            }, [isSuccess, isDuplicate, isBusMismatch, onClose]);

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-slide-up" onClick={e => e.stopPropagation()}>
                        <div className={`p-8 text-center flex flex-col items-center justify-center ${isSuccess ? 'bg-emerald-50' : (status==='duplicate'?'bg-amber-50':'bg-rose-50')}`}>
                            <div className={`w-20 h-20 rounded-full flex items-center justify-center mb-4 ${isSuccess ? 'bg-emerald-100 text-emerald-600' : (status==='duplicate'?'bg-amber-100 text-amber-600':'bg-rose-100 text-rose-600')}`}>
                                <Icon name={isSuccess ? 'check' : (status==='duplicate'?'alert':'x')} size={40} />
                            </div>
                            <h2 className={`text-2xl font-bold mb-1 ${isSuccess ? 'text-emerald-800' : (status==='duplicate'?'text-amber-800':'text-rose-800')}`}>{msg}</h2>
                            <p className="text-slate-500 font-medium">{subMsg}</p>
                        </div>
                        {user && (
                            <div className="p-6 bg-white space-y-4">
                                <div className="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                    <div className="w-12 h-12 rounded-full bg-incar text-white flex items-center justify-center font-bold text-lg">{user.name[0]}</div>
                                    <div>
                                        <div className="font-bold text-lg text-slate-900 break-keep">{user.name}</div>
                                        <div className="text-xs text-slate-400 font-medium break-all">{user.org} | {user.uid}</div>
                                        <div className="text-xs text-incar font-bold mt-1">배정{domainInfo.isOutbound ? '항공' : '차량'}: {session ? getUserSessionInfo(user, session).expectedBus : getUserSessionInfo(user, null).expectedBus}</div>
                                    </div>
                                </div>
                                {isSuccess && logs && logs.finalAmount !== undefined && (
                                    <div className="flex justify-between items-center p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                                        <span className="text-emerald-700 font-bold text-sm break-keep">최종 지급액</span>
                                        <div className="text-right">
                                            <span className="text-2xl font-bold text-emerald-600 break-keep">{CURRENCY}{logs.finalAmount}</span>
                                            {logs.penaltyApplied > 0 && <div className="text-[10px] text-rose-500 font-bold break-keep">(-패널티 {CURRENCY}{logs.penaltyApplied})</div>}
                                        </div>
                                    </div>
                                )}
                                {isTargetMismatch && (
                                    <div className="p-4 bg-rose-50 border border-rose-100 rounded-xl text-center">
                                        <p className="text-sm font-bold text-rose-600 mb-2 break-keep">현장에서 바로 변경하시겠습니까?</p>
                                        {currentAdmin?.role === 'staff' ? (
                                            <p className="text-xs text-slate-500 break-keep">일정 변경 및 패널티 승인은 <strong className="text-rose-500">MANAGER 이상</strong> 권한이 필요합니다. 관리자에게 문의하세요.</p>
                                        ) : (
                                            <button onClick={() => onForceUpdate(user, session, requiredChoice)} className="w-full py-3 bg-rose-500 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform text-sm break-keep">네, 일정 변경 후 승인</button>
                                        )}
                                    </div>
                                )}
                                {isBusMismatch && (
                                    <div className="p-4 bg-rose-50 border border-rose-100 rounded-xl text-center">
                                        <p className="text-sm font-bold text-rose-600 mb-2 break-keep">배정수단({domainInfo.isOutbound ? '항공편' : '차량'})이 일치하지 않습니다</p>
                                        <p className="text-xs text-slate-500 mb-1 break-keep">해당 인원은 <strong>{getUserSessionInfo(user, session).expectedBus}</strong> 탑승 대상입니다.</p>
                                        <p className="text-xs text-slate-400 break-keep">다른 수단으로 안내하거나, 관리자에게 문의하세요.</p>
                                    </div>
                                )}
                            </div>
                        )}
                        <button onClick={onClose} className="w-full py-5 bg-slate-900 text-white font-bold text-lg hover:bg-slate-800 transition-colors break-keep">닫기 (Enter)</button>
                    </div>
                </div>
            );
        };

        const SessionDetailModal = ({ session, users, logs, onClose, onManualComplete }) => {
            const [tab, setTab] = useState('done');
            const [searchTerm, setSearchTerm] = useState('');
            
            const domainInfo = getSessionDomainInfo(session);
            const isPaymentSession = session.type === 'PAYMENT';

            const targetUsers = useMemo(() => {
                if (!session) return [];
                return users.filter(u => {
                    const { isTarget, expectedBus } = getUserSessionInfo(u, session);
                    if (!isTarget) return false;
                    if (session.type === 'BOARDING' && ['비탑승', '제외', '-', '미정', ''].includes(expectedBus)) return false;
                    return true;
                });
            }, [session, users]);

            const { doneList, yetList } = useMemo(() => {
                const doneIds = new Set(logs.filter(l => l.sessionId === session.id).map(l => l.uid));
                const done = []; const yet = [];
                targetUsers.forEach(u => {
                    if (doneIds.has(u.uid)) { done.push({ ...u, log: logs.find(l => l.sessionId === session.id && l.uid === u.uid) }); } 
                    else { yet.push(u); }
                });
                return { doneList: done, yetList: yet };
            }, [targetUsers, logs, session]);

            const busSummary = useMemo(() => {
                if(isPaymentSession) return null;
                const counts = {};
                doneList.forEach(u => {
                    const b = u.log?.bus || '기타';
                    counts[b] = (counts[b] || 0) + 1;
                });
                return counts;
            }, [doneList, isPaymentSession]);

            const doneGroups = useMemo(() => {
                const groups = {};
                doneList.forEach(u => { 
                    const groupName = isPaymentSession ? '지급 완료 대상자' : (u.log && u.log.bus && u.log.bus !== '-' ? u.log.bus : '기타/미정'); 
                    if(!groups[groupName]) groups[groupName] = []; 
                    groups[groupName].push(u); 
                });
                return groups;
            }, [doneList, isPaymentSession]);

            const yetGroups = useMemo(() => {
                const groups = {};
                yetList.forEach(u => { 
                    const expectedBus = getUserSessionInfo(u, session).expectedBus; 
                    const groupName = isPaymentSession ? '미지급 대상자' : expectedBus;
                    if(!groups[groupName]) groups[groupName] = []; 
                    groups[groupName].push(u); 
                });
                return groups;
            }, [yetList, session, isPaymentSession]);

            // 🔥 수정 2: 자유/안내(스캔불필요) 일정일 경우 모든 대상자를 하나의 그룹으로 표기
            const allUsersGroups = useMemo(() => {
                return { '전체 대상자 목록': targetUsers };
            }, [targetUsers]);

            const [expandedGroups, setExpandedGroups] = useState({});
            const toggleGroup = (groupName) => setExpandedGroups(prev => ({ ...prev, [groupName]: !prev[groupName] }));

            // 🔥 수정 2 연장선: NONE 타입일 때는 전체 목록을 currentGroups로 사용
            const currentGroups = session.type === 'NONE' ? allUsersGroups : (tab === 'done' ? doneGroups : yetGroups);
            
            const filteredGroups = useMemo(() => {
                if (!searchTerm) return currentGroups;
                const lowerTerm = searchTerm.toLowerCase();
                const result = {};
                for (const [group, userList] of Object.entries(currentGroups)) {
                    const matched = userList.filter(u => u.name.toLowerCase().includes(lowerTerm) || String(u.uid).includes(lowerTerm));
                    if (matched.length > 0) result[group] = matched;
                }
                return result;
            }, [currentGroups, searchTerm]);

            const groupKeys = Object.keys(filteredGroups).sort();

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                        <div className="p-6 border-b border-slate-100 flex justify-between items-start bg-slate-50">
                            <div>
                                <span className={`inline-block px-2 py-1 rounded text-[10px] font-bold mb-1 ${isPaymentSession?'bg-emerald-100 text-emerald-600': session.type==='NONE'?'bg-slate-200 text-slate-600':'bg-indigo-100 text-incar'}`}>
                                    {domainInfo.label}
                                </span>
                                <h3 className="font-bold text-lg text-slate-800 leading-tight break-keep pr-2">{session.title}</h3>
                                <p className="text-xs text-slate-500 mt-1 break-keep">{session.displayDate} | 전체 대상 {targetUsers.length}명</p>
                            </div>
                            <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="x" size={24}/></button>
                        </div>
                        
                        <div className="p-4 border-b border-slate-100 bg-white">
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                    <Icon name="search" size={16} />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="이름 또는 사번으로 검색..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-incar/20 transition-all"
                                />
                            </div>
                        </div>

                        {session.type !== 'NONE' ? (
                            <>
                                <div className="flex border-b border-slate-100">
                                    <button onClick={()=>setTab('done')} className={`flex-1 py-4 text-sm font-bold transition-colors ${tab==='done'?'text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50/50':'text-slate-400 hover:bg-slate-50'}`}>{isPaymentSession ? '지급 완료' : `${domainInfo.label} 완료`} ({doneList.length})</button>
                                    <button onClick={()=>setTab('yet')} className={`flex-1 py-4 text-sm font-bold transition-colors ${tab==='yet'?'text-rose-500 border-b-2 border-rose-500 bg-rose-50/50':'text-slate-400 hover:bg-slate-50'}`}>{isPaymentSession ? '미지급' : `미${domainInfo.label}`} ({yetList.length})</button>
                                </div>
                                
                                {tab === 'done' && doneList.length > 0 && busSummary && !isPaymentSession && (
                                    <div className="p-3 bg-slate-50 border-b border-slate-200 flex flex-wrap gap-2 items-center">
                                        <span className="text-xs font-bold text-slate-500 mr-1 break-keep">{domainInfo.isOutbound ? '항공' : '차량'}별 현황:</span>
                                        {Object.entries(busSummary).sort().map(([bus, count]) => (
                                            <span key={bus} className="px-2.5 py-1 bg-white border border-slate-200 rounded-lg text-xs font-bold text-incar shadow-sm break-keep">
                                                {bus}: {count}명
                                            </span>
                                        ))}
                                    </div>
                                )}

                                <div className="overflow-y-auto flex-1 p-4 space-y-4 custom-scrollbar bg-slate-50/30">
                                    {groupKeys.length === 0 ? <div className="py-10 text-center text-slate-400 text-sm">{searchTerm ? '검색 결과가 없습니다.' : '해당 인원이 없습니다.'}</div> : groupKeys.map(groupName => (
                                        <div key={groupName} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                            <button onClick={() => toggleGroup(groupName)} className="w-full p-4 flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition-colors">
                                                <div className="flex items-center gap-2"><div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white ${tab==='done'?'bg-emerald-500':'bg-incar'}`}><Icon name={isPaymentSession ? 'money' : domainInfo.icon} size={16} /></div><div className="text-left"><div className="font-bold text-slate-800 text-sm break-keep">{groupName} {!isPaymentSession ? (tab==='done'?`(실제 ${domainInfo.label})`:`(배정 ${domainInfo.isOutbound ? '항공' : '차량'})`) : ''}</div><div className="text-[10px] text-slate-500">{filteredGroups[groupName].length}명 {tab === 'done' ? '처리 완료' : '대기중'}</div></div></div>
                                                <Icon name={expandedGroups[groupName] || searchTerm ? "up" : "down"} size={20} className="text-slate-400" />
                                            </button>
                                            {(expandedGroups[groupName] || searchTerm) && (
                                                <div className="p-2 space-y-2 border-t border-slate-100 bg-white">
                                                    {filteredGroups[groupName].map(u => {
                                                        const expectedBus = getUserSessionInfo(u, session).expectedBus;
                                                        const isCrossBoarded = !isPaymentSession && tab === 'done' && u.log && expectedBus !== u.log.bus;
                                                        
                                                        return (
                                                            <div key={u.uid} className={`flex justify-between items-center p-3 rounded-lg border ${isCrossBoarded ? 'border-amber-200 bg-amber-50' : 'border-slate-50 hover:bg-slate-50'}`}>
                                                                <div className="flex items-center gap-3">
                                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0 ${tab==='done'?'bg-emerald-500':'bg-slate-300'}`}>{u.name[0]}</div>
                                                                    <div>
                                                                        <div className="font-bold text-slate-800 text-sm flex items-center gap-1 flex-wrap break-keep">
                                                                            {u.name} 
                                                                            {isCrossBoarded && <span className="text-[9px] bg-amber-500 text-white px-1.5 py-0.5 rounded ml-1 shrink-0">수단변경</span>}
                                                                        </div>
                                                                        <div className="text-[10px] text-slate-400 font-mono break-all">{u.uid}</div>
                                                                        {isCrossBoarded && <div className="text-[10px] text-amber-600 font-bold mt-0.5 break-keep">원래 배정: {expectedBus}</div>}
                                                                    </div>
                                                                </div>
                                                                {tab === 'done' && u.log && <div className="text-right shrink-0 ml-2">{isPaymentSession && <div className="font-bold text-emerald-600 text-sm">{CURRENCY}{u.log.finalAmount}</div>}<div className="text-[10px] text-slate-400">{formatTimeSafe(u.log.timestamp)}</div></div>}
                                                                {tab === 'yet' && <button onClick={() => onManualComplete(u, session)} className="px-3 py-1.5 bg-slate-800 text-white text-[10px] font-bold rounded-lg hover:bg-slate-700 shadow-sm shrink-0 ml-2">수동 완료</button>}
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="overflow-y-auto flex-1 p-4 space-y-4 custom-scrollbar bg-slate-50/30">
                                <div className="px-2 pb-2 text-sm font-bold text-slate-500 border-b border-slate-200">해당 일정 대상자 전체 목록 <span className="text-[10px] font-normal ml-2 bg-slate-200 px-2 py-0.5 rounded text-slate-600">스캔 불필요</span></div>
                                {groupKeys.length === 0 ? <div className="py-10 text-center text-slate-400 text-sm">{searchTerm ? '검색 결과가 없습니다.' : '해당 인원이 없습니다.'}</div> : groupKeys.map(groupName => (
                                    <div key={groupName} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                        <button onClick={() => toggleGroup(groupName)} className="w-full p-4 flex justify-between items-center bg-slate-50 hover:bg-slate-100 transition-colors">
                                            <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-lg bg-slate-400 text-white flex items-center justify-center"><Icon name="users" size={16} /></div><div className="text-left"><div className="font-bold text-slate-800 text-sm">{groupName}</div><div className="text-[10px] text-slate-500">{filteredGroups[groupName].length}명 대상</div></div></div>
                                            <Icon name={expandedGroups[groupName] || searchTerm ? "up" : "down"} size={20} className="text-slate-400" />
                                        </button>
                                        {(expandedGroups[groupName] || searchTerm) && (
                                            <div className="p-2 space-y-2 border-t border-slate-100 bg-white">
                                                {filteredGroups[groupName].map(u => (
                                                    <div key={u.uid} className="flex justify-between items-center p-3 rounded-lg border border-slate-50 hover:bg-slate-50">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white bg-slate-300">{u.name[0]}</div>
                                                            <div><div className="font-bold text-slate-800 text-sm">{u.name}</div><div className="text-[10px] text-slate-400 font-mono break-all">{u.uid}</div></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const DashboardView = ({ users, logs, scheduleStats, groupedStats, groupKeys, changeLogs, onSessionClick }) => {
            // 🔥 수정 3: 일정 변경 이력 모달 제어 상태
            const [showChangeLog, setShowChangeLog] = useState(false);

            return (
                <div className="space-y-6 animate-slide-up relative">
                    
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-card border-l-8 border-incar flex flex-col justify-center">
                            <div className="text-slate-400 text-[10px] md:text-xs font-bold mb-1 break-keep">전체 참가자</div>
                            <div className="text-2xl md:text-3xl lg:text-4xl font-black text-slate-800">{users.length}명</div>
                        </div>
                        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-card border-l-8 border-emerald-50 flex flex-col justify-center">
                            <div className="text-slate-400 text-[10px] md:text-xs font-bold mb-1 break-keep">총 지급액</div>
                            <div className="text-2xl md:text-3xl lg:text-4xl font-black text-slate-800 break-keep">{CURRENCY}{logs.reduce((sum, l) => sum + (l.finalAmount||0), 0).toLocaleString()}</div>
                        </div>
                        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-card border-l-8 border-indigo-400 flex flex-col justify-center">
                            <div className="text-slate-400 text-[10px] md:text-xs font-bold mb-1 break-keep">전체 달성률</div>
                            <div className="text-2xl md:text-3xl lg:text-4xl font-black text-slate-800">
                                {scheduleStats.filter(s => s.type !== 'NONE').length > 0 ? Math.round(scheduleStats.filter(s => s.type !== 'NONE').reduce((acc, s) => acc + s.percent, 0) / scheduleStats.filter(s => s.type !== 'NONE').length) : 0}%
                            </div>
                        </div>
                        {/* 🔥 수정 3: 패널티 -> 일정 변경 건수로 수정하고 클릭 시 모달 오픈 로직 연결 */}
                        <div onClick={() => setShowChangeLog(true)} className="cursor-pointer bg-white p-4 md:p-6 rounded-3xl shadow-card border-l-8 border-rose-400 flex flex-col justify-center hover:shadow-md transition-shadow active:scale-[0.98]">
                            <div className="text-slate-400 text-[10px] md:text-xs font-bold mb-1 break-keep flex items-center justify-between">일정 변경 건수 <Icon name="search" size={12}/></div>
                            <div className="text-2xl md:text-3xl lg:text-4xl font-black text-slate-800">{changeLogs.length}건</div>
                        </div>
                    </div>

                    <div>
                        <h3 className="font-bold text-lg text-slate-800 mb-4 flex items-center gap-2"><Icon name="dashboard" className="text-incar"/> 관광/일정별 진행 현황</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {scheduleStats.map(stat => {
                                const domainInfo = getSessionDomainInfo(stat);
                                const sessionPenalties = logs.filter(l => l.sessionId === stat.id).reduce((sum, l) => sum + (l.penaltyApplied || 0), 0);
                                return (
                                    <div key={stat.id} onClick={() => onSessionClick(stat)} className="cursor-pointer bg-white p-5 rounded-2xl shadow-sm border border-slate-100 relative overflow-hidden group hover:shadow-md transition-shadow active:scale-[0.98] transition-transform">
                                        <div className="absolute right-0 top-0 p-3 opacity-10"><Icon name={stat.type === 'PAYMENT' ? 'money' : stat.type === 'NONE' ? 'info' : domainInfo.icon} size={60} /></div>
                                        <div className="relative z-10">
                                            <div className="flex justify-between items-start mb-2"><span className={`text-[10px] font-bold px-2 py-0.5 rounded ${stat.type==='PAYMENT'?'bg-emerald-100 text-emerald-600':stat.type==='NONE'?'bg-slate-200 text-slate-600':'bg-indigo-50 text-incar'}`}>{domainInfo.label}</span><span className="text-xs font-bold text-slate-400">{stat.displayDate}</span></div>
                                            <h4 className="font-bold text-slate-800 mb-4 pr-2 leading-tight break-keep min-h-[2.5rem]">{stat.title}</h4>
                                            {stat.type !== 'NONE' ? (
                                                <>
                                                    <div className="flex justify-between items-end mb-1"><span className="text-3xl font-bold text-slate-800">{stat.doneCount}<span className="text-sm text-slate-400 font-medium ml-1">/ {stat.targetCount}</span></span><span className={`text-xl font-bold ${stat.percent === 100 ? 'text-emerald-500' : 'text-incar'}`}>{stat.percent}%</span></div>
                                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-2"><div className={`h-full rounded-full transition-all duration-1000 ${stat.percent===100?'bg-emerald-500':'bg-incar'}`} style={{width: `${stat.percent}%`}}></div></div>
                                                    {stat.type === 'PAYMENT' && (
                                                        <div className="pt-2 border-t border-slate-50 flex flex-col gap-1 text-xs">
                                                            <div className="flex justify-between"><span className="text-slate-400 break-keep">집행액</span><span className="font-bold text-slate-700 break-keep">{CURRENCY}{stat.actualAmount.toLocaleString()}</span></div>
                                                            {sessionPenalties > 0 && <div className="flex justify-between text-[10px] text-rose-500 font-bold break-keep"><span>(패널티 차감분)</span><span>-{CURRENCY}{sessionPenalties.toLocaleString()}</span></div>}
                                                            <div className="flex justify-between mt-1 pt-1 border-t border-slate-100/50 break-keep"><span className="text-slate-400">예상 (변경전)</span><span>{CURRENCY}{stat.expectedAmount.toLocaleString()}</span></div>
                                                        </div>
                                                    )}
                                                </>
                                            ) : (
                                                <div className="pt-2">
                                                    <div className="flex justify-between items-end mb-2">
                                                        <span className="text-3xl font-bold text-slate-800">{stat.targetCount}<span className="text-sm text-slate-400 font-medium ml-1">명 대상</span></span>
                                                    </div>
                                                    <div className="py-2 text-slate-400 text-sm font-medium border-t border-slate-100 break-keep">스캔 및 진행도 체크 불필요</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    
                    <div className="pc-only bg-white rounded-3xl border border-slate-200 shadow-card overflow-hidden mt-8">
                        {/* 🔥 수정 4: 상세 현황 분석표 아이콘 제거 */}
                        <div className="p-5 border-b border-slate-100 bg-slate-50/50">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2 break-keep">상세 현황 분석표</h3>
                        </div>
                        {groupKeys.length === 0 ? <div className="p-10 text-center text-slate-400">데이터가 없습니다.</div> : (
                            <div className="p-6 space-y-8">
                                {groupKeys.map((date) => {
                                    const stats = groupedStats[date];
                                    return (
                                        <div key={date}>
                                            <h4 className="text-xs font-bold text-incar bg-indigo-50 px-3 py-1.5 rounded-lg inline-block mb-3">{date}</h4>
                                            <div className="overflow-x-auto rounded-xl border border-slate-200">
                                                <table className="w-full text-left data-table">
                                                    <thead><tr><th className="min-w-[120px]">관광/일정명</th><th className="text-center">속성</th><th className="text-right">대상(Target)</th><th className="text-right">완료(Done)</th><th className="text-center border-l border-slate-200">상태</th><th className="text-right">예상 금액</th><th className="text-right">실제 집행</th><th className="text-center border-l border-slate-200">차액 (Diff)</th></tr></thead>
                                                    <tbody>
                                                        {stats.map(s => {
                                                            const dInfo = getSessionDomainInfo(s);
                                                            return (
                                                            <tr key={s.id} onClick={() => onSessionClick(s)} className="cursor-pointer hover:bg-slate-50 transition-colors">
                                                                <td className="font-bold text-slate-700 whitespace-nowrap">{s.title}</td>
                                                                <td className="text-center"><span className={`px-2 py-0.5 rounded text-[10px] font-bold border whitespace-nowrap ${s.type==='PAYMENT'?'bg-emerald-50 text-emerald-600 border-emerald-100':s.type==='NONE'?'bg-slate-100 text-slate-500 border-slate-200':'bg-indigo-50 text-incar border-indigo-100'}`}>{dInfo.label}</span></td>
                                                                <td className="text-right text-slate-500">{s.type === 'NONE' ? '-' : s.targetCount}</td>
                                                                <td className="text-right font-bold text-slate-900">{s.type === 'NONE' ? '-' : s.doneCount}</td>
                                                                <td className="text-center border-l border-slate-50">{s.type === 'NONE' ? <span className="text-slate-400 text-xs">스캔없음</span> : s.targetCount - s.doneCount === 0 ? <span className="text-emerald-500 font-bold text-xs whitespace-nowrap">Complete</span> : <span className="text-rose-500 font-bold text-xs whitespace-nowrap">{s.targetCount - s.doneCount}명 남음</span>}</td>
                                                                <td className="text-right text-slate-400 whitespace-nowrap">{s.type==='PAYMENT'?`${CURRENCY}${s.expectedAmount.toLocaleString()}`:'-'}</td>
                                                                <td className="text-right font-bold text-emerald-600 whitespace-nowrap">{s.type==='PAYMENT'?`${CURRENCY}${s.actualAmount.toLocaleString()}`:'-'}</td>
                                                                <td className="text-center border-l border-slate-50">{s.type !== 'PAYMENT' ? '-' : (s.diffAmount === 0 ? <span className="text-emerald-500 font-bold text-xs">OK</span> : s.diffAmount < 0 ? <span className="text-rose-500 font-bold text-xs">{s.diffAmount}</span> : <span className="text-blue-500 font-bold text-xs">+{s.diffAmount}</span>)}</td>
                                                            </tr>
                                                        )})}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* 🔥 수정 3: 일정 변경 전체 내역 모달창 */}
                    {showChangeLog && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm animate-fade-in" onClick={() => setShowChangeLog(false)}>
                            <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh]" onClick={e => e.stopPropagation()}>
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><Icon name="history" size={20} className="text-rose-500"/> 전체 일정 변경 내역</h3>
                                        <p className="text-[10px] text-slate-400 mt-1">현장에서 참가자 일정을 수정한 모든 기록입니다.</p>
                                    </div>
                                    <button onClick={() => setShowChangeLog(false)} className="p-2 text-slate-400 hover:text-slate-600"><Icon name="x" size={24}/></button>
                                </div>
                                <div className="p-4 overflow-y-auto custom-scrollbar flex-1 bg-slate-50/50">
                                    {changeLogs.length === 0 ? (
                                        <div className="text-center text-slate-400 py-10 text-sm">변경 이력이 없습니다.</div>
                                    ) : (
                                        <div className="space-y-3">
                                            {changeLogs.map(log => (
                                                <div key={log.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-center text-xs text-slate-400 mb-2 border-b border-slate-100 pb-2">
                                                        <span>{formatDateSafe(log.timestamp)}</span>
                                                        <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold break-keep">{log.name} ({log.uid})</span>
                                                    </div>
                                                    <div className="font-bold text-sm text-slate-800 mb-1 break-keep">{cleanOptionKey(log.targetOption)} 변경</div>
                                                    <div className="flex flex-wrap items-center gap-2 text-sm text-slate-600 mb-2 break-keep">
                                                        <span className="line-through opacity-70">{log.oldVal}</span>
                                                        <Icon name="chevronsDown" size={14} className="rotate-[-90deg] text-slate-300" />
                                                        <span className="text-incar font-bold">{log.newVal}</span>
                                                    </div>
                                                    <div className="text-xs text-slate-500 bg-slate-50 p-2 rounded-lg border border-slate-100 break-keep leading-relaxed">
                                                        <span className="font-bold mr-1">사유:</span> {log.reason}
                                                        {log.penalty > 0 && <span className="ml-2 text-rose-500 font-bold block sm:inline mt-1 sm:mt-0">(차액/패널티 {CURRENCY}{log.penalty} 적용됨)</span>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ScanView = ({ mode, schedules, targetSessionId, setTargetSessionId, targetBus, setTargetBus, manualBus, setManualBus, isScanning, setIsScanning, processScan, users, isMobile, busList, setBusList, scanResult }) => {
            const scannerRef = useRef(null); const isRunningRef = useRef(false); const [isStrictBusMode, setIsStrictBusMode] = useState(false);
            const [manualCode, setManualCode] = useState('');
            const [cameraList, setCameraList] = useState([]);
            const [currentCamId, setCurrentCamId] = useState(null);
            
            const isProcessingRef = useRef(false);

            useEffect(() => {
                return () => {
                    if (scannerRef.current && isRunningRef.current) {
                        try {
                            scannerRef.current.stop().then(() => {
                                if (scannerRef.current) scannerRef.current.clear();
                            }).catch(() => {});
                        } catch(e) {}
                        isRunningRef.current = false;
                    }
                    setIsScanning(false);
                };
            }, [setIsScanning]);

            useEffect(() => {
                if (!scanResult) {
                    const timer = setTimeout(() => { isProcessingRef.current = false; }, 500);
                    return () => clearTimeout(timer);
                } else {
                    isProcessingRef.current = true;
                }
            }, [scanResult]);

            const filteredSchedules = useMemo(() => schedules.filter(s => s.type === mode), [schedules, mode]);
            useEffect(() => { if (filteredSchedules.length > 0) { const exists = filteredSchedules.find(s => s.id === targetSessionId); if (!exists) setTargetSessionId(filteredSchedules[0].id); } else { setTargetSessionId(''); } }, [mode, filteredSchedules]);
            
            const selectedSession = useMemo(() => filteredSchedules.find(s => s.id === targetSessionId), [filteredSchedules, targetSessionId]);
            const domainInfo = getSessionDomainInfo(selectedSession);

            useEffect(() => {
                let barcodeStr = '';
                let timeout = null;
                const handleKeyDown = (e) => {
                    if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'Enter') {
                        if (barcodeStr.length > 0) {
                            if (isProcessingRef.current) { barcodeStr = ''; return; } 
                            isProcessingRef.current = true;
                            processScan(barcodeStr, isStrictBusMode);
                            barcodeStr = '';
                        }
                    } else if (e.key.length === 1) { 
                        barcodeStr += e.key;
                        clearTimeout(timeout);
                        timeout = setTimeout(() => { barcodeStr = ''; }, 100); 
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isStrictBusMode, processScan]);


            const handleAddBus = () => {
                let nextNum = 1;
                if (busList.length > 0) {
                    const nums = busList.map(b => { const match = b.match(/(\d+)호차/); return match ? parseInt(match[1]) : 0; });
                    nextNum = Math.max(...nums, 0) + 1;
                }
                const newBus = `${nextNum}호차`;
                setBusList([...busList, newBus]);
                if(!manualBus) setTargetBus(newBus);
            };

            const handleRenameBus = (index) => {
                const oldName = busList[index];
                const newName = prompt(`'${oldName}'의 새로운 이름을 입력하세요:`, oldName);
                if (newName && newName.trim()) {
                    const newList = [...busList]; newList[index] = newName.trim(); setBusList(newList);
                    if(targetBus === oldName) setTargetBus(newName.trim());
                }
            };

            const handleDeleteBus = (index, e) => {
                e.stopPropagation();
                if(confirm(`'${busList[index]}'을(를) 삭제하시겠습니까?`)){
                    const newList = busList.filter((_, i) => i !== index); setBusList(newList);
                    if(targetBus === busList[index] && newList.length > 0) setTargetBus(newList[0]);
                }
            };

            const executeScanner = async (camIdToUse = null) => {
                if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");
                
                let cams = cameraList;
                if (cams.length === 0) {
                    try { 
                        const allCams = await Html5Qrcode.getCameras(); 
                        cams = allCams.filter(c => {
                            const label = c.label.toLowerCase();
                            return !label.includes('front') && !label.includes('전면') && !label.includes('user');
                        });
                        if(cams.length === 0) cams = allCams;
                        setCameraList(cams); 
                    } catch(e){}
                }

                let targetId = camIdToUse;
                if (!targetId && cams.length > 0) {
                    targetId = cams[cams.length - 1].id; 
                }
                if (targetId) setCurrentCamId(targetId);

                let configForStart;
                if (targetId) {
                    configForStart = targetId; 
                } else {
                    configForStart = { facingMode: "environment" }; 
                }

                const config = {
                    fps: 15,
                    qrbox: function(vw, vh) {
                        const min = Math.min(vw, vh);
                        return { width: Math.floor(min * 0.75), height: Math.floor(min * 0.75) };
                    },
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                };

                const onScan = (decodedText) => {
                    if (isProcessingRef.current) return; 
                    isProcessingRef.current = true;
                    processScan(decodedText, isStrictBusMode);
                };

                try {
                    await scannerRef.current.start(configForStart, config, onScan, undefined);
                    isRunningRef.current = true;
                    
                    setTimeout(() => {
                        try {
                            const track = scannerRef.current.getRunningTrack();
                            if (track && track.getCapabilities) {
                                const caps = track.getCapabilities();
                                if (caps.zoom) {
                                    track.applyConstraints({ advanced: [{ zoom: Math.min(caps.zoom.max, 2.0) }] });
                                }
                            }
                        } catch(e) {}
                    }, 500);

                } catch(e) {
                     try {
                         await scannerRef.current.start({ facingMode: "environment" }, config, onScan, undefined);
                         isRunningRef.current = true;
                     } catch(e2) {
                         setIsScanning(false); alert("카메라 접근에 최종 실패했습니다. 권한을 확인해주세요.");
                     }
                }
            };

            const startScanner = () => {
                if (!targetSessionId) return alert("선택된 일정이 없습니다.");
                if (isRunningRef.current) return; 
                setIsScanning(true);
                setTimeout(() => executeScanner(), 200);
            };

            const stopScanner = () => {
                if (scannerRef.current && isRunningRef.current) {
                    scannerRef.current.stop().then(() => {
                        scannerRef.current.clear();
                        isRunningRef.current = false;
                        setIsScanning(false);
                    }).catch(() => {
                        isRunningRef.current = false;
                        setIsScanning(false);
                    });
                } else {
                    setIsScanning(false);
                }
            };

            const handleSwitchCamera = () => {
                if (cameraList.length < 2) return alert("전환 가능한 다른 렌즈가 없습니다.");
                const currentIdx = cameraList.findIndex(c => c.id === currentCamId);
                const nextIdx = (currentIdx + 1) % cameraList.length;
                const nextCamId = cameraList[nextIdx].id;
                setCurrentCamId(nextCamId);

                if (scannerRef.current && isRunningRef.current) {
                    scannerRef.current.stop().then(() => {
                        isRunningRef.current = false;
                        setTimeout(() => executeScanner(nextCamId), 200);
                    }).catch(() => {});
                }
            };

            const handleManualSubmit = (e) => {
                e.preventDefault();
                if(manualCode.trim()) {
                    if (isProcessingRef.current) return;
                    isProcessingRef.current = true;
                    processScan(manualCode.trim(), isStrictBusMode);
                    setManualCode('');
                }
            }

            return (
                <div className="space-y-6 h-full flex flex-col animate-slide-up">
                    <div className="bg-white p-6 rounded-3xl shadow-card border border-slate-200">
                        <div className="flex items-center gap-2 mb-4"><span className={`px-2 py-1 rounded-lg text-xs font-bold ${mode==='BOARDING'?'bg-incar text-white':'bg-emerald-500 text-white'}`}>{mode==='BOARDING' ? 'STEP 1' : '지급'}</span><h3 className="text-lg font-bold text-slate-800 break-keep">{mode==='BOARDING' ? '탑승/수속 일정 선택' : '지급 항목 선택'}</h3></div>
                        <div className="mb-6">
                            {filteredSchedules.length > 0 ? (
                                <select value={targetSessionId} onChange={(e) => setTargetSessionId(e.target.value)} className={`w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-lg outline-none focus:ring-4 transition-all break-keep ${mode==='BOARDING'?'focus:ring-incar/20':'focus:ring-emerald-500/20'}`}>
                                    {filteredSchedules.map(s => {
                                        const dInfo = getSessionDomainInfo(s);
                                        return <option key={s.id} value={s.id}>[{s.displayDate}] {s.title} ({dInfo.label})</option>
                                    })}
                                </select>
                            ) : (
                                <div className="p-4 text-center text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200 break-keep">진행 가능한 일정이 없습니다.</div>
                            )}
                        </div>
                        {mode === 'BOARDING' && filteredSchedules.length > 0 && (
                            <div className="animate-slide-up">
                                {domainInfo.isOutbound ? (
                                    <div className="flex items-center gap-3 bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                                        <div className="w-10 h-10 rounded-full bg-white text-incar flex items-center justify-center shadow-sm shrink-0"><Icon name="plane" size={24} /></div>
                                        <div>
                                            <h4 className="font-bold text-indigo-900 text-sm">해당 일정은 항공(출국) 일정입니다.</h4>
                                            <p className="text-xs text-indigo-700 mt-0.5">버스 호차 대신 참가자의 <strong>[배정항공]</strong>을 기준으로 자동 확인합니다.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        {domainInfo.isInbound && (
                                            <div className="flex items-center gap-3 bg-indigo-50 p-4 rounded-xl border border-indigo-100 mb-3">
                                                <div className="w-10 h-10 rounded-full bg-white text-incar flex items-center justify-center shadow-sm shrink-0"><Icon name="plane" size={24} /></div>
                                                <div>
                                                    <h4 className="font-bold text-indigo-900 text-sm">귀국(공항 이동) 일정입니다.</h4>
                                                    <p className="text-xs text-indigo-700 mt-0.5">호텔 환송 행사 후 탑승할 <strong>[버스 호차]</strong>를 선택하고 스캔해주세요.</p>
                                                </div>
                                            </div>
                                        )}
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-3 w-full">
                                            <div className="flex items-center gap-2 shrink-0"><span className="px-2 py-1 rounded-lg text-[10px] sm:text-xs font-bold bg-slate-800 text-white">STEP 2</span><h3 className="text-base sm:text-lg font-bold text-slate-800 break-keep">현장 탑승 차량 선택</h3></div>
                                            <div className="flex gap-2 items-center shrink-0 w-full sm:w-auto">
                                                <div className="flex flex-1 sm:flex-none items-center justify-center sm:justify-start bg-slate-100 rounded-lg px-2 py-1.5 gap-2 cursor-pointer" onClick={() => setIsStrictBusMode(!isStrictBusMode)}>
                                                    <div className={`w-8 h-4 rounded-full relative transition-colors shrink-0 ${isStrictBusMode ? 'bg-incar' : 'bg-slate-300'}`}><div className={`absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full transition-transform ${isStrictBusMode ? 'translate-x-4' : 'translate-x-0'}`}></div></div>
                                                    <span className={`text-[10px] font-bold break-keep ${isStrictBusMode ? 'text-incar' : 'text-slate-400'}`}>배차 검증 (지정호차)</span>
                                                </div>
                                                <button onClick={()=>setManualBus(!manualBus)} className={`text-[10px] sm:text-xs font-bold px-3 py-1.5 rounded-lg transition-colors shrink-0 whitespace-nowrap ${manualBus ? 'bg-incar text-white shadow-md' : 'bg-slate-100 text-slate-500'}`}>
                                                    {manualBus ? '관리 완료' : '차량 관리'}
                                                </button>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 gap-2">
                                            {busList.map((bus, i) => (
                                                <div key={i} className="relative group">
                                                    <button onClick={() => manualBus ? handleRenameBus(i) : setTargetBus(bus)} className={`w-full py-3 rounded-xl text-sm font-bold transition-all relative break-keep ${targetBus === bus && !manualBus ? 'bg-incar text-white shadow-lg scale-105 z-10' : manualBus ? 'bg-white border-2 border-dashed border-indigo-200 text-indigo-400 hover:bg-indigo-50' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                                        {bus}
                                                        {manualBus && <span className="absolute bottom-0.5 right-1 text-[8px] opacity-50">수정</span>}
                                                    </button>
                                                    {manualBus && <button onClick={(e) => handleDeleteBus(i, e)} className="absolute -top-2 -right-2 w-6 h-6 bg-rose-500 text-white rounded-full flex items-center justify-center shadow-md z-20 hover:scale-110"><Icon name="x" size={12} /></button>}
                                                </div>
                                            ))}
                                            <button onClick={handleAddBus} className="py-3 rounded-xl text-sm font-bold bg-slate-50 border-2 border-dashed border-slate-200 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-all flex items-center justify-center"><Icon name="plus" size={20} /></button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                    
                    <div className="mt-2 mb-2">
                        <button disabled={filteredSchedules.length === 0} onClick={startScanner} className={`w-full py-6 text-white rounded-3xl font-bold text-xl shadow-xl flex items-center justify-center gap-3 transition-transform break-keep ${filteredSchedules.length === 0 ? 'bg-slate-300 shadow-none cursor-not-allowed' : mode==='BOARDING'?'bg-incar shadow-incar/30 active:scale-95':'bg-emerald-500 shadow-emerald-500/30 active:scale-95'}`}><Icon name="qr" size={28}/> {domainInfo.label} 스캔 시작</button>
                    </div>

                    {filteredSchedules.length > 0 && (
                        <div className="flex-1 flex flex-col justify-end">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mt-auto">
                                <form onSubmit={handleManualSubmit} className="flex gap-2">
                                    <div className="flex-1 relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                            <Icon name="user" size={16} />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={manualCode}
                                            onChange={(e) => setManualCode(e.target.value)}
                                            placeholder="사번 직접 입력 (바코드 스캐너 가능)" 
                                            className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-incar/20 transition-all break-keep"
                                        />
                                    </div>
                                    <button type="submit" className="bg-slate-800 text-white px-6 rounded-xl font-bold text-sm shadow-md hover:bg-slate-700 shrink-0 break-keep">입력</button>
                                </form>
                                <p className="text-[10px] text-slate-400 mt-2 text-center break-keep">
                                    * USB/블루투스 바코드 스캐너 사용 시 화면 어디서나 스캔하면 자동 인식됩니다.
                                </p>
                            </div>
                        </div>
                    )}

                    {isScanning && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex flex-col items-center justify-center p-6 animate-fade-in">
