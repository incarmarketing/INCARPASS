                            <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-3 pb-safe bg-slate-50">
                                {currentList.length === 0 ? (
                                    <div className="text-center text-slate-400 text-sm py-12 break-keep">{scanTab === 'yet' ? (mode === 'BOARDING' ? '해당 수단에 탑승 대기중인 대상자가 없습니다.' : '대기중인 대상자가 없습니다.') : '처리된 대상자가 없습니다.'}</div>
                                ) : (
                                    currentList.map(item => {
                                        const u = item;
                                        const isBoarded = scanTab === 'done';
                                        const { expectedBus } = getUserSessionInfo(u, selectedSession);
                                        
                                        return (
                                            <div key={u.uid} className={`flex justify-between items-center p-4 rounded-2xl border transition-colors shadow-sm ${isBoarded ? (mode==='BOARDING'?'bg-indigo-50/50 border-indigo-100':'bg-emerald-50/50 border-emerald-100') : 'bg-white border-slate-200'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold text-white shrink-0 shadow-sm ${isBoarded ? (mode==='BOARDING'?'bg-incar':'bg-emerald-500') : 'bg-slate-300'}`}>{u.name[0]}</div>
                                                    <div>
                                                        <div className="font-bold text-base text-slate-800 flex items-center gap-2">
                                                            {u.name}
                                                            {isBoarded && <span className={`text-[10px] px-2 py-0.5 rounded font-black ${mode==='BOARDING'?'bg-incar text-white':'bg-emerald-500 text-white'}`}>{mode==='BOARDING'?'탑승완료':'지급완료'}</span>}
                                                        </div>
                                                        <div className="text-xs text-slate-400 mt-1 flex flex-col gap-1">
                                                            <span>{u.org} | {u.uid}</span>
                                                            {mode === 'BOARDING' && expectedBus && !['미정', '-', '자유일정'].includes(expectedBus) && <span className="font-bold text-incar">배정: {expectedBus}</span>}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div>
                                                    {isBoarded ? (
                                                        <button onClick={() => handleFastAction(u, selectedSession, targetBus, true)} className="px-4 py-2.5 bg-white text-slate-500 border border-slate-200 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 text-xs font-bold rounded-xl transition-colors shadow-sm whitespace-nowrap">
                                                            {mode==='BOARDING' ? '하차' : '지급 취소'}
                                                        </button>
                                                    ) : (
                                                        <button onClick={() => handleFastAction(u, selectedSession, targetBus, false)} className={`px-6 py-3 text-white text-sm font-bold rounded-xl shadow-md transition-transform active:scale-95 whitespace-nowrap ${mode==='BOARDING'?'bg-slate-800 hover:bg-slate-700':'bg-emerald-500 hover:bg-emerald-600'}`}>
                                                            {mode==='BOARDING' ? '탑승' : '지급'}
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChangeView = ({ searchQuery, setSearchQuery, selectedUser, setSelectedUser, editForm, setEditForm, handleUserUpdate, users, schedules, changeLogs, logs, busList }) => {
            const [manualInput, setManualInput] = useState(false);
            const [showAllHistory, setShowAllHistory] = useState(false);
            const [isLookupScanning, setIsLookupScanning] = useState(false);
            const [financialImpact, setFinancialImpact] = useState(null);
            const [showQrModal, setShowQrModal] = useState(false);
            const html5QrCodeRef = useRef(null);
            
            const [cameraList, setCameraList] = useState([]);
            const [currentCamId, setCurrentCamId] = useState(null);
            
            const [localRefundReq, setLocalRefundReq] = useState(null);
            const [localForfeitReq, setLocalForfeitReq] = useState(null);
            
            const [searchResults, setSearchResults] = useState([]);
            
            const isRunningRef = useRef(false);

            useEffect(() => {
                if (isLookupScanning) {
                    document.body.classList.add('scanning-active');
                } else {
                    document.body.classList.remove('scanning-active');
                }
                return () => document.body.classList.remove('scanning-active');
            }, [isLookupScanning]);

            useEffect(() => {
                if (selectedUser) {
                    const isStillExist = users.find(u => u.uid === selectedUser.uid);
                    if (!isStillExist) {
                        setSelectedUser(null);
                        setEditForm({ optKey: '', optVal: '', newBus: '', penalty: 0, reason: '' });
                    }
                }
            }, [users]); 

            useEffect(() => { 
                return () => { 
                    if (html5QrCodeRef.current && isRunningRef.current) { 
                        try {
                            html5QrCodeRef.current.stop().then(() => {
                                if (html5QrCodeRef.current) html5QrCodeRef.current.clear();
                            }).catch(() => {});
                        } catch(e) {}
                        isRunningRef.current = false;
                    } 
                }; 
            }, []);

            const executeLookupScanner = async (camIdToUse = null) => {
                if (!html5QrCodeRef.current) html5QrCodeRef.current = new Html5Qrcode("lookup-reader");
                
                let cams = cameraList;
                if (cams.length === 0) {
                    try { 
                        const allCams = await Html5Qrcode.getCameras(); 
                        cams = allCams.filter(c => {
                            const label = c.label.toLowerCase();
                            return !label.includes('front') && !label.includes('전면') && !label.includes('user');
                        });
                        if(cams.length === 0) cams = allCams;
                        setCameraList(cams); 
                    } catch(e){}
                }

                let targetId = camIdToUse;
                if (!targetId) {
                    const savedCamId = localStorage.getItem('incar_pro_cam_id');
                    if (savedCamId && cams.some(c => c.id === savedCamId)) {
                        targetId = savedCamId;
                    } else if (cams.length > 0) {
                        targetId = cams[cams.length - 1].id; 
                    }
                }
                if (targetId) setCurrentCamId(targetId);

                let configForStart;
                if (targetId) {
                    configForStart = targetId; 
                } else {
                    configForStart = { facingMode: "environment" }; 
                }

                const config = {
                    fps: 30, 
                    qrbox: function(vw, vh) {
                        const min = Math.min(vw, vh);
                        return { width: Math.floor(min * 0.85), height: Math.floor(min * 0.85) }; 
                    },
                    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                };

                const onScanSuccess = (decodedText) => {
                    stopLookupScanner();
                    let scannedUid = decodedText;
                    if (decodedText.includes('eid=')) {
                        scannedUid = decodedText.split('eid=')[1].split('&')[0];
                    } else if (decodedText.includes('uid=')) {
                        scannedUid = decodedText.split('uid=')[1].split('&')[0];
                    } else if (decodedText.includes('_')) {
                        scannedUid = decodedText.split('_')[0];
                    }
                    scannedUid = String(scannedUid).trim();
                    
                    let found = users.find(u => String(u.uid) === String(scannedUid));
                    if (!found) found = users.find(u => decodedText.includes(String(u.uid))); 

                    if (found) {
                        setSelectedUser(found);
                        setSearchResults([]);
                    } else {
                        alert(`미등록 사용자입니다. (스캔된 값: ${decodedText})`);
                    }
                };

                try {
                    await html5QrCodeRef.current.start(configForStart, config, onScanSuccess, undefined);
                    isRunningRef.current = true;
                } catch(e) {
                    try {
                        await html5QrCodeRef.current.start({ facingMode: "environment" }, config, onScanSuccess, undefined);
                        isRunningRef.current = true;
                    } catch(e2) {
                        setIsLookupScanning(false); alert("카메라 접근 실패: " + e2);
                    }
                }
            };

            const startLookupScanner = () => {
                setIsLookupScanning(true);
                setTimeout(() => executeLookupScanner(), 200);
            };

            const stopLookupScanner = () => {
                if (html5QrCodeRef.current && isRunningRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear();
                        isRunningRef.current = false;
                        setIsLookupScanning(false);
                    }).catch(() => {
                        isRunningRef.current = false;
                        setIsLookupScanning(false);
                    });
                } else {
                    setIsLookupScanning(false);
                }
            };

            const handleSwitchCamera = () => {
                if (cameraList.length < 2) return alert("전환 가능한 다른 렌즈가 없습니다.");
                const currentIdx = cameraList.findIndex(c => c.id === currentCamId);
                const nextIdx = (currentIdx + 1) % cameraList.length;
                const nextCamId = cameraList[nextIdx].id;
                setCurrentCamId(nextCamId);
                
                localStorage.setItem('incar_pro_cam_id', nextCamId);

                if (html5QrCodeRef.current && isRunningRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        isRunningRef.current = false;
                        setTimeout(() => executeLookupScanner(nextCamId), 200);
                    }).catch(() => {});
                }
            };

            const userSchedules = useMemo(() => {
                if (!selectedUser || !schedules) return [];
                return schedules.filter(s => getUserSessionInfo(selectedUser, s).isTarget).sort((a,b) => {
                    if (a.date === b.date) return (a.order || 0) - (b.order || 0);
                    return a.date > b.date ? 1 : -1;
                });
            }, [selectedUser, schedules]);

            const uniqueValues = useMemo(() => {
                if (!editForm.optKey) return [];
                const values = new Set();
                if (users) users.forEach(u => { if (u.options && u.options[editForm.optKey]) values.add(u.options[editForm.optKey]); });
                if (schedules) schedules.forEach(s => { 
                    if (s.targetKey === editForm.optKey && s.targetVal !== 'ALL') {
                        s.targetVal.split(',').forEach(tv => values.add(tv.trim()));
                    } 
                });
                return Array.from(values).sort();
            }, [editForm.optKey, users, schedules]);

            useEffect(() => {
                if (selectedUser && editForm.optKey) {
                    const dayStrMatch = editForm.optKey.match(/(\d+일차)/);
                    let busKey = '버스';
                    if (dayStrMatch) busKey = `${dayStrMatch[1]}버스`;
                    
                    let currentBus = selectedUser.options[busKey] || selectedUser.options[`${dayStrMatch ? dayStrMatch[1]+' ' : ''}버스`] || selectedUser.bus || '';
                    setEditForm(prev => ({ ...prev, newBus: currentBus }));
                }
            }, [editForm.optKey, selectedUser]);

            const isBusRequired = useMemo(() => {
                if (!editForm.optKey || !editForm.optVal || !schedules) return false;
                if (editForm.optVal.includes('자유') || editForm.optVal.includes('미정') || editForm.optVal === '-') return false;
                
                const relatedSchedules = schedules.filter(s => s.targetKey === editForm.optKey && (s.targetVal === editForm.optVal || s.targetVal === 'ALL' || s.targetVal.includes(editForm.optVal)));
                return relatedSchedules.some(s => s.type === 'BOARDING' && s.nature !== '출국' && s.nature !== '귀국');
            }, [editForm.optKey, editForm.optVal, schedules]);

            const busStats = useMemo(() => {
                if (!editForm.optKey || !busList) return [];
                const dayMatch = editForm.optKey.match(/(\d+일차)/);
                const busKey1 = dayMatch ? `${dayMatch[1]}버스` : '버스';
                const busKey2 = dayMatch ? `${dayMatch[1]} 버스` : '버스';

                return busList.map(bus => {
                    const usersInBus = users.filter(u => {
                        const uBus = u.options[busKey1] || u.options[busKey2] || u.bus;
                        return String(uBus).trim() === bus;
                    });
                    
                    const destCounts = {};
                    usersInBus.forEach(u => {
                        const dest = u.options[editForm.optKey];
                        if(dest) destCounts[dest] = (destCounts[dest] || 0) + 1;
                    });
                    
                    const sortedDests = Object.entries(destCounts).sort((a,b) => b[1] - a[1]);
                    const mainDest = sortedDests.length > 0 ? sortedDests[0][0] : '배정없음';
                    
                    return {
                        bus,
                        totalCount: usersInBus.length,
                        mainDest
                    };
                });
            }, [busList, users, editForm.optKey]);

            useEffect(() => {
                if (!selectedUser || !editForm.optKey || !editForm.optVal || !schedules) {
                    setFinancialImpact(null);
                    return;
                }
                const oldVal = selectedUser.options[editForm.optKey];
                const newVal = editForm.optVal;
                
                if (oldVal === newVal) {
                    setFinancialImpact(null);
                    return;
                }

                const oldRelatedSchedules = schedules.filter(s => s.targetKey === editForm.optKey && s.targetVal === oldVal);
                const newRelatedSchedules = schedules.filter(s => s.targetKey === editForm.optKey && s.targetVal === newVal);

                const oldPrice = oldRelatedSchedules.filter(s => s.targetKey === editForm.optKey && s.targetVal === oldVal && s.type === 'PAYMENT').reduce((sum, s) => sum + (s.price || 0), 0);
                const newPrice = newRelatedSchedules.filter(s => s.targetKey === editForm.optKey && s.targetVal === newVal && s.type === 'PAYMENT').reduce((sum, s) => sum + (s.price || 0), 0);
                
                const oldLogs = logs.filter(l => l.uid === selectedUser.uid && oldRelatedSchedules.some(s => s.id === l.sessionId) && !l.isCancelled);
                const paidAmount = oldLogs.filter(l => l.action === '지급').reduce((sum, l) => sum + (l.finalAmount || 0), 0);

                const diff = oldPrice - newPrice;
                
                const impact = {
                    oldPrice, newPrice, paidAmount, diff,
                    needsRefund: paidAmount > newPrice, 
                    refundAmount: Math.max(0, paidAmount - newPrice),
                    needsExtraPay: paidAmount < newPrice && paidAmount > 0, 
                    extraPayAmount: Math.max(0, newPrice - paidAmount)
                };
                
                setFinancialImpact(impact);

                if (impact.needsRefund) {
                    setEditForm(prev => ({ ...prev, penalty: -impact.refundAmount, reason: `기지급금 미반환 패널티 (${oldVal} -> ${newVal})` }));
                } else if (diff > 0 && paidAmount === 0) {
                    setEditForm(prev => ({ ...prev, penalty: diff, reason: `일정 변경 차액 (${oldVal} -> ${newVal})` }));
                } else {
                    setEditForm(prev => ({ ...prev, penalty: 0, reason: `일정 변경 (${oldVal} -> ${newVal})` }));
                }
            }, [editForm.optVal, editForm.optKey, selectedUser, schedules, logs]);

            const userHistoryLogs = useMemo(() => {
                if(!selectedUser) return []; 
                return changeLogs.filter(l => l.uid === selectedUser.uid).sort((a,b) => {
                    const tA = new Date(a.timestamp).getTime();
                    const tB = new Date(b.timestamp).getTime();
                    return (isNaN(tB) ? 0 : tB) - (isNaN(tA) ? 0 : tA);
                });
            }, [changeLogs, selectedUser]);
            const visibleLogs = showAllHistory ? userHistoryLogs : userHistoryLogs.slice(0, 1);

            const onSaveClick = () => {
                if (!selectedUser || !editForm.optKey || !editForm.optVal) {
                    return alert("변경할 항목을 선택하거나 입력하세요.");
                }

                if (isBusRequired && (!editForm.newBus || editForm.newBus.trim() === '' || editForm.newBus === '-')) {
                    return alert(`[${editForm.optVal}] 일정은 버스 배정이 필수입니다. 탑승할 호차를 선택해주세요.`);
                }
                
                const oldVal = selectedUser.options[editForm.optKey];
                const newVal = editForm.optVal;

                if (financialImpact && financialImpact.needsRefund) {
                    setLocalRefundReq({ amount: financialImpact.refundAmount, oldVal, newVal });
                    return;
                }

                const oldBoardingSchedules = schedules.filter(s => s.targetKey === editForm.optKey && s.targetVal === oldVal && s.type === 'BOARDING');
                const newPaymentSchedules = schedules.filter(s => s.targetKey === editForm.optKey && s.targetVal === newVal && s.type === 'PAYMENT');
                
                if (oldBoardingSchedules.length > 0 && newPaymentSchedules.length > 0) {
                    const newPrice = newPaymentSchedules.reduce((sum, s) => sum + (s.price || 0), 0);
                    if (newPrice > 0) {
                        setLocalForfeitReq({ oldVal, newVal, price: newPrice, session: newPaymentSchedules[0] });
                        return;
                    }
                }

                handleUserUpdate();
            };

            const resolveLocalRefund = (isReturned) => {
                if (isReturned) {
                    handleUserUpdate(-localRefundReq.amount, `기존 지급액(${CURRENCY}${localRefundReq.amount}) 현장 반환 완료`);
                } else {
                    handleUserUpdate(localRefundReq.amount, `미반환금 패널티 부과 (${localRefundReq.oldVal} -> ${localRefundReq.newVal})`);
                }
                setLocalRefundReq(null);
            };

            const resolveLocalForfeit = (shouldPay) => {
                if (shouldPay) {
                    handleUserUpdate(0, `예약 위약금 면제 (${localForfeitReq.oldVal} -> ${localForfeitReq.newVal})`);
                } else {
                    handleUserUpdate(localForfeitReq.price, `예약취소 위약금 부과 (${localForfeitReq.oldVal} -> ${localForfeitReq.newVal})`);
                }
                setLocalForfeitReq(null);
            };

            return (
                <div className="space-y-6 animate-slide-up">
                    <div className="bg-white p-6 rounded-3xl shadow-card">
                        <h3 className="font-bold text-lg mb-4 text-slate-800 break-keep">참가자 일정 변경 및 관리</h3>
                        <div className="flex flex-col gap-2 mb-6 relative">
                            <input type="text" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} placeholder="사번 또는 이름 검색" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none focus:border-incar" />
                            <div className="flex gap-2">
                                <button onClick={startLookupScanner} className="bg-slate-100 text-slate-600 px-4 py-4 rounded-2xl hover:bg-slate-200 transition-colors border border-slate-200 flex-none" title="QR 스캔으로 찾기"><Icon name="qr" size={24} /></button>
                                <button onClick={()=>{ 
                                    const term = normalizeString(searchQuery);
                                    if(!term) return alert('검색어를 입력하세요.');
                                    
                                    const foundList = users.filter(u => normalizeString(u.uid).includes(term) || normalizeString(u.name).includes(term)); 
                                    
                                    if (foundList.length === 1) {
                                        setSelectedUser(foundList[0]);
                                        setSearchResults([]);
                                    } else if (foundList.length > 1) {
                                        setSearchResults(foundList);
                                    } else {
                                        alert("사용자를 찾을 수 없습니다.");
                                        setSearchResults([]);
                                    }
                                }} className="flex-1 bg-slate-800 text-white px-6 py-4 rounded-2xl font-bold break-keep">검색</button>
                            </div>
                            
                            {searchResults.length > 0 && !selectedUser && (
                                <div className="absolute top-full left-0 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-lg overflow-hidden z-50 animate-slide-up">
                                    <div className="p-3 bg-indigo-50 border-b border-indigo-100 text-xs font-bold text-indigo-800 flex justify-between items-center">
                                        <span>검색 결과 ({searchResults.length}명) - 대상을 선택해주세요</span>
                                        <button onClick={() => setSearchResults([])} className="text-indigo-400 hover:text-indigo-600"><Icon name="x" size={16}/></button>
                                    </div>
                                    <div className="max-h-48 overflow-y-auto custom-scrollbar">
                                        {searchResults.map(u => (
                                            <button key={u.uid} onClick={() => { setSelectedUser(u); setSearchResults([]); }} className="w-full text-left p-4 border-b border-slate-50 hover:bg-slate-50 transition-colors flex justify-between items-center group">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-600 group-hover:bg-incar group-hover:text-white transition-colors">{u.name[0]}</div>
                                                    <div>
                                                        <div className="font-bold text-sm text-slate-800">{u.name}</div>
                                                        <div className="text-[10px] text-slate-400">{u.org}</div>
                                                    </div>
                                                </div>
                                                <div className="text-xs font-mono font-bold text-incar">{u.uid}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {isLookupScanning && (
                            <div className="fixed inset-0 z-[300] bg-black/95 flex flex-col items-center justify-center p-6 animate-fade-in" style={{ touchAction: 'none' }}>
                                <button onClick={stopLookupScanner} className="absolute top-8 right-8 text-white p-3 bg-white/10 rounded-full z-[101]"><Icon name="x" size={32} /></button>
                                <div className="scanner-container"><div id="lookup-reader"></div></div>
                                <p className="text-white mt-8 font-bold text-xl animate-pulse text-center break-keep">조회할 QR코드를 스캔하세요</p>
                                
                                {cameraList.length > 1 && (
                                    <button onClick={handleSwitchCamera} className="mt-6 px-6 py-3 bg-incar text-white font-bold rounded-full shadow-lg flex items-center gap-2 active:scale-95 transition-transform z-[101]">
                                        <Icon name="refresh" size={18} /> 렌즈 변경 (초점이 안 맞을 때)
                                    </button>
                                )}
                                
                                <p className="text-amber-400 mt-4 text-xs text-center break-keep font-medium leading-relaxed">
                                    💡 가까이 대지 마시고 15cm 정도 떨어뜨려주세요.<br/>렌즈가 여러 개인 폰은 '렌즈 변경' 버튼을 누르면 초점이 맞습니다.
                                </p>
                            </div>
                        )}

                        {selectedUser && (
                            <div className="border-t border-slate-100 pt-6 space-y-4">
                                <div className="flex flex-col md:flex-row gap-6 mb-6">
                                    <div className="flex-1 bg-slate-50 p-5 rounded-2xl border border-slate-100 flex flex-col justify-center">
                                        <div className="flex justify-between items-start mb-2"><div><div className="font-black text-2xl text-slate-800 break-keep">{selectedUser.name}</div><div className="text-sm font-bold text-slate-500 break-all">{selectedUser.org}</div></div><div className="text-right"><div className="text-[10px] font-bold text-slate-400 uppercase">사번(ID)</div><div className="font-mono font-bold text-incar">{selectedUser.uid}</div></div></div>
                                        <div className="mt-4 pt-4 border-t border-slate-200/50 flex justify-between items-center"><span className="text-xs font-bold text-slate-400 break-keep">누적 차감액(패널티)</span><span className="font-black text-rose-500 text-lg break-keep">-{CURRENCY}{selectedUser.penaltyTotal || 0}</span></div>
                                    </div>
                                    <div className="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center text-center w-full md:w-auto cursor-pointer hover:bg-slate-50 hover:border-incar/30 transition-all group" onClick={() => setShowQrModal(true)} title="QR코드 확대 및 다운로드">
                                        <div className="mb-2 w-28 h-28 flex items-center justify-center bg-white rounded-xl shadow-sm border border-slate-100 p-2 group-hover:scale-105 transition-transform"><QRCodeCanvas text={`https://incarmkt.github.io/travel/?eid=${selectedUser.uid}`} size={100} /></div>
                                        <span className="text-[10px] font-bold text-incar flex items-center gap-1 bg-indigo-50 px-2 py-1 rounded-full break-keep"><Icon name="search" size={10}/> QR 확대/저장</span>
                                    </div>
                                </div>

                                <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-5 mb-4">
                                    <h4 className="font-bold text-incar mb-3 flex items-center gap-2 break-keep"><Icon name="dashboard" size={16}/> {selectedUser.name}님의 전체 여행 일정</h4>
                                    {userSchedules.length === 0 ? <div className="text-center text-slate-400 text-xs py-4 break-keep">배정된 일정이 없습니다.</div> : (
                                        <div className="max-h-60 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                                            {userSchedules.map((s, idx) => {
                                                const dInfo = getSessionDomainInfo(s);
                                                const { expectedBus } = getUserSessionInfo(selectedUser, s);
                                                return (
                                                <div key={idx} className="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm flex justify-between items-center">
                                                    <div><span className="text-[10px] font-bold text-slate-400 block break-keep">{s.displayDate}</span><span className="font-bold text-slate-800 break-keep">{s.title}</span>{s.type === 'BOARDING' && expectedBus && !['미정', '-', '자유일정'].includes(expectedBus) && <div className="text-[10px] text-incar mt-0.5 font-bold break-keep">배정수단: {expectedBus}</div>}</div>
                                                    <div className="text-right shrink-0 ml-2"><span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold whitespace-nowrap ${s.type==='PAYMENT'?'bg-emerald-100 text-emerald-600':s.type==='NONE'?'bg-slate-100 text-slate-500':'bg-slate-100 text-slate-500'}`}>{s.type==='PAYMENT' ? `지급 ${CURRENCY}${s.price}` : s.type==='NONE' ? '단순안내' : dInfo.label}</span></div>
                                                </div>
                                            )})}
                                        </div>
                                    )}
                                </div>

                                <div className="mt-6 pt-6 border-t border-slate-100">
                                    <h4 className="font-bold text-sm text-slate-800 mb-3 flex items-center gap-2 break-keep"><Icon name="history" size={16}/> 변경 및 정산 이력</h4>
                                    {userHistoryLogs.length === 0 ? <p className="text-xs text-slate-400 break-keep">변경 이력이 없습니다.</p> : (
                                        <div className="space-y-3">
                                            <div className="hidden md:block overflow-x-auto"><table className="w-full text-xs text-left"><thead className="bg-slate-50 text-slate-500 font-bold"><tr><th className="p-2">일시</th><th className="p-2">항목</th><th className="p-2">내용</th><th className="p-2 text-right">차액/패널티</th><th className="p-2">사유</th></tr></thead><tbody className="divide-y divide-slate-100">{visibleLogs.map((log, i) => (<tr key={i}><td className="p-2 text-slate-400 whitespace-nowrap">{formatDateSafe(log.timestamp)}</td><td className="p-2 font-bold whitespace-nowrap">{cleanOptionKey(log.targetOption)}</td><td className="p-2 break-keep"><span className="line-through text-slate-300">{log.oldVal}</span> <span className="mx-1 text-slate-300">→</span> <span className="text-incar font-bold">{log.newVal}</span></td><td className="p-2 text-right font-bold text-rose-500 whitespace-nowrap">{log.penalty !== 0 ? (log.penalty > 0 ? `-${CURRENCY}${log.penalty}` : `+${CURRENCY}${Math.abs(log.penalty)}`) : '-'}</td><td className="p-2 text-slate-500 truncate max-w-[100px]">{log.reason}</td></tr>))}</tbody></table></div>
                                            <div className="md:hidden space-y-2">{visibleLogs.map((log, i) => (<div key={i} className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex flex-col gap-2"><div className="flex justify-between items-center text-xs text-slate-400 font-medium border-b border-slate-200 pb-2 mb-1"><span>{formatDateSafe(log.timestamp)}</span><span className="bg-white px-2 py-0.5 rounded border border-slate-200 break-keep">{cleanOptionKey(log.targetOption)}</span></div><div className="flex items-center justify-center gap-2 text-sm break-keep text-center"><span className="line-through text-slate-400">{log.oldVal}</span><Icon name="chevronsDown" size={12} className="rotate-[-90deg] text-slate-300" /><span className="font-bold text-incar">{log.newVal}</span></div><div className="flex justify-between items-end mt-1 pt-2 border-t border-slate-200/50"><span className="text-xs text-slate-500 flex-1 break-keep pr-2">{log.reason}</span><span className={`text-sm font-bold break-keep ${log.penalty > 0 ? 'text-rose-500' : 'text-emerald-500'}`}>{log.penalty !== 0 ? (log.penalty > 0 ? `-${CURRENCY}${log.penalty}` : `+${CURRENCY}${Math.abs(log.penalty)}`) : '-'}</span></div></div>))}</div>
                                            {userHistoryLogs.length > 1 && <button onClick={() => setShowAllHistory(!showAllHistory)} className="w-full py-2 text-xs font-bold text-slate-400 bg-slate-50 hover:bg-slate-100 rounded-lg flex items-center justify-center gap-1 break-keep">{showAllHistory ? '접기' : `더보기 (${userHistoryLogs.length - 1}건 더 있음)`} <Icon name={showAllHistory ? "up" : "down"} size={12} /></button>}
                                        </div>
                                    )}
                                </div>

                                <div className="grid grid-cols-2 gap-4 mt-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-1 break-keep">변경 전 옵션</label>
                                        <select value={editForm.optKey} onChange={e=>setEditForm({...editForm, optKey: e.target.value})} className="w-full p-3 border rounded-xl font-bold text-sm bg-white">
                                            <option value="">선택하세요</option>
                                            {Object.keys(selectedUser.options)
                                                .filter(key => !key.includes('버스'))
                                                .sort((a, b) => {
                                                    const getOrder = (k) => {
                                                        if (k.includes('1일차')) return 1;
                                                        if (k.includes('2일차')) return 2;
                                                        if (k.includes('만찬')) return 3;
                                                        if (k.includes('3일차')) return 4;
                                                        if (k.includes('항공') || k.includes('귀국')) return 5;
                                                        return 6;
                                                    };
                                                    const orderA = getOrder(a);
                                                    const orderB = getOrder(b);
                                                    if (orderA !== orderB) return orderA - orderB;
                                                    return a.localeCompare(b);
                                                })
                                                .map(key => <option key={key} value={key}>{cleanOptionKey(key)} (현재: {selectedUser.options[key]})</option>)
                                            }
                                        </select>
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="block text-xs font-bold text-slate-400 break-keep">변경 후 옵션</label>
                                            <button onClick={()=>setManualInput(!manualInput)} className="text-[10px] text-incar underline font-bold break-keep">{manualInput ? '목록에서 선택' : '직접 입력'}</button>
                                        </div>
                                        {manualInput ? 
                                            <input type="text" value={editForm.optVal} onChange={e=>setEditForm({...editForm, optVal: e.target.value})} className="w-full p-3 border rounded-xl font-bold text-sm bg-white break-keep" placeholder="직접 입력하세요" /> : 
                                            <select value={editForm.optVal} onChange={e=>setEditForm({...editForm, optVal: e.target.value})} className="w-full p-3 border rounded-xl font-bold text-sm bg-white">
                                                <option value="">선택하세요</option>
                                                {uniqueValues.map(val => <option key={val} value={val}>{val}</option>)}
                                                <option value="직접입력">[목록에 없음]</option>
                                            </select>
                                        }
                                    </div>
                                    
                                    <div className="col-span-2 border-t border-slate-100 pt-4 mt-2">
                                        <label className="block text-xs font-bold text-slate-800 mb-2 break-keep">
                                            탑승 호차 배정 {isBusRequired ? <span className="text-rose-500">(필수 선택)</span> : <span className="text-slate-400">(선택 사항)</span>}
                                        </label>
                                        {busStats.length > 0 && (
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-2">
                                                {!isBusRequired && (
                                                    <button 
                                                        type="button"
                                                        onClick={() => setEditForm({...editForm, newBus: '-'})}
                                                        className={`p-3 rounded-xl border text-center flex flex-col items-center justify-center transition-all relative overflow-hidden ${editForm.newBus === '-' || !editForm.newBus ? 'bg-incar text-white border-incar shadow-md' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 text-slate-500'}`}
                                                    >
                                                        <div className="font-bold text-sm">선택 안함</div>
                                                    </button>
                                                )}
                                                {busStats.map(stat => {
                                                    const isSelected = editForm.newBus === stat.bus;
                                                    const isRecommended = stat.mainDest.includes(editForm.optVal) || (editForm.optVal && editForm.optVal.includes(stat.mainDest));
                                                    return (
                                                        <button 
                                                            type="button"
                                                            key={stat.bus}
                                                            onClick={() => setEditForm({...editForm, newBus: stat.bus})}
                                                            className={`p-3 rounded-xl border text-left transition-all relative overflow-hidden ${isSelected ? 'bg-incar text-white border-incar shadow-md' : isRecommended ? 'bg-indigo-50 border-indigo-200 hover:bg-indigo-100' : 'bg-white border-slate-200 hover:bg-slate-50'}`}
                                                        >
                                                            {isRecommended && !isSelected && <div className="absolute top-0 right-0 bg-indigo-500 text-white text-[8px] px-1.5 py-0.5 rounded-bl-lg font-bold">추천</div>}
                                                            <div className="font-bold text-sm mb-0.5">{stat.bus}</div>
                                                            <div className={`text-[10px] break-keep leading-tight ${isSelected ? 'text-white/80' : 'text-slate-500'}`}>
                                                                주 목적지: <span className="font-bold">{stat.mainDest}</span><br/>
                                                                현재 배정: {stat.totalCount}명
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                        <div className="flex items-center gap-2 mt-2">
                                            <span className="text-xs font-bold text-slate-400 whitespace-nowrap">직접 입력:</span>
                                            <input type="text" value={editForm.newBus} onChange={e=>setEditForm({...editForm, newBus: e.target.value})} className="flex-1 p-2 border border-slate-200 rounded-lg text-sm font-bold bg-slate-50 focus:bg-white focus:border-incar outline-none transition-colors" placeholder="예: 4호차" />
                                        </div>
                                    </div>
                                </div>

                                {financialImpact && (
                                    <div className={`mt-2 p-4 rounded-xl border ${financialImpact.needsRefund ? 'bg-rose-50 border-rose-200' : financialImpact.needsExtraPay ? 'bg-emerald-50 border-emerald-200' : 'bg-amber-50 border-amber-200'}`}>
                                        <h5 className={`font-bold text-sm mb-2 break-keep ${financialImpact.needsRefund ? 'text-rose-700' : financialImpact.needsExtraPay ? 'text-emerald-700' : 'text-amber-700'}`}>
                                            <Icon name="info" size={16} className="inline mr-1 -mt-0.5" />
                                            일정 변경에 따른 정산 필요
                                        </h5>
                                        <ul className="text-xs space-y-1 text-slate-600 break-keep">
                                            <li>• 기존 예상지급액: {CURRENCY}{financialImpact.oldPrice}</li>
                                            <li>• 변경 예상지급액: {CURRENCY}{financialImpact.newPrice}</li>
                                            <li className="font-bold border-t border-slate-200/50 mt-1 pt-1">• 현재까지 실제 지급 완료: <span className="text-incar">{CURRENCY}{financialImpact.paidAmount}</span></li>
                                        </ul>
                                        <div className="mt-3 break-keep">
                                            {financialImpact.needsRefund && <span className="inline-block bg-rose-500 text-white font-bold text-xs px-2 py-1 rounded">⚠️ 현장 반환 필요: {CURRENCY}{financialImpact.refundAmount} (미반환 시 패널티 적용됨)</span>}
                                            {financialImpact.needsExtraPay && <span className="inline-block bg-emerald-500 text-white font-bold text-xs px-2 py-1 rounded">✅ 추가 지급 발생: {CURRENCY}{financialImpact.extraPayAmount} (해당 일정 스캔에서 처리됨)</span>}
                                            {!financialImpact.needsRefund && !financialImpact.needsExtraPay && financialImpact.diff > 0 && financialImpact.paidAmount === 0 && <span className="inline-block bg-amber-500 text-white font-bold text-xs px-2 py-1 rounded">💰 지급 전 다운그레이드: {CURRENCY}{financialImpact.diff} 차감 적용됨</span>}
                                            {!financialImpact.needsRefund && !financialImpact.needsExtraPay && financialImpact.diff <= 0 && <span className="inline-block bg-blue-500 text-white font-bold text-xs px-2 py-1 rounded">✔️ 추가 비용 및 반환 문제 없음</span>}
                                        </div>
                                    </div>
                                )}

                                <div>
                                    <label className="block text-xs font-bold text-slate-400 mb-1 break-keep">차액/패널티 수동입력 ({CURRENCY})</label>
                                    <input type="number" value={editForm.penalty} onChange={e=>setEditForm({...editForm, penalty: e.target.value})} className="w-full p-3 border border-rose-200 bg-rose-50 rounded-xl font-bold text-rose-600 break-keep" />
                                    <p className="text-[10px] text-slate-400 mt-1 break-keep">
                                        * 음수(-)를 입력하면 총 차감액(패널티)에서 차감(반환 정산)됩니다.
                                    </p>
                                </div>
                                <div><label className="block text-xs font-bold text-slate-400 mb-1 break-keep">변경 사유</label><input type="text" value={editForm.reason} onChange={e=>setEditForm({...editForm, reason: e.target.value})} className="w-full p-3 border rounded-xl font-bold text-sm break-keep" /></div>
                                <button onClick={onSaveClick} className="w-full py-4 bg-incar text-white font-bold rounded-2xl shadow-lg mt-4 hover:bg-incar-dark break-keep">저장하기</button>
                            </div>
                        )}

                        {showQrModal && selectedUser && (
                            <div className="fixed inset-0 z-[400] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 animate-fade-in" onClick={() => setShowQrModal(false)}>
                                <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center text-center max-w-sm w-full animate-slide-up" onClick={e => e.stopPropagation()}>
                                    <div className="w-12 h-12 bg-incar/10 text-incar rounded-full flex items-center justify-center mb-4">
                                        <Icon name="qr" size={24} />
                                    </div>
                                    <h3 className="font-black text-2xl text-slate-800 mb-1 break-keep">{selectedUser.name}</h3>
                                    <p className="text-sm font-bold text-slate-400 mb-6 break-all">{selectedUser.org} | {selectedUser.uid}</p>
                                    
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6 shadow-inner">
                                        <QRCodeCanvas text={`https://incarmkt.github.io/travel/?eid=${selectedUser.uid}`} size={200} id="user-qr-canvas-large" />
                                    </div>
                                    
                                    <p className="text-xs text-slate-500 mb-6 font-medium break-keep">명찰을 분실한 참가자에게 이 화면을 보여주거나,<br/>이미지로 다운로드하여 재발급할 수 있습니다.</p>
                                    
                                    <div className="flex gap-3 w-full">
                                        <button onClick={() => setShowQrModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors break-keep">닫기</button>
                                        <button onClick={() => {
                                            const canvas = document.getElementById('user-qr-canvas-large');
                                            if(canvas) {
                                                const link = document.createElement('a');
                                                link.download = `QR_${selectedUser.name}_${selectedUser.uid}.png`;
                                                link.href = canvas.toDataURL();
                                                link.click();
                                            }
                                        }} className="flex-1 py-3 bg-incar text-white font-bold rounded-xl shadow-lg hover:bg-incar-dark transition-colors flex items-center justify-center gap-2 break-keep">
                                            <Icon name="download" size={16} /> 저장
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {localRefundReq && (
                            <div className="fixed inset-0 z-[400] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm animate-fade-in">
                                <div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl animate-slide-up">
                                    <div className="bg-rose-50 p-6 text-center border-b border-rose-100">
                                        <div className="w-16 h-16 bg-white text-rose-500 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm text-2xl font-bold">{CURRENCY}</div>
                                        <h3 className="text-xl font-black text-rose-600 mb-1 break-keep">지급금 반환 확인</h3>
                                        <p className="text-slate-600 font-bold text-sm break-keep">{selectedUser.name}님은<br/>이미 <span className="text-rose-600 underline">{CURRENCY}{localRefundReq.amount}</span>을 지급받았습니다.</p>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div className="text-center text-xs text-slate-400 mb-2 break-keep">기존: {localRefundReq.oldVal} <br/>▼ <br/>변경: {localRefundReq.newVal}</div>
                                        <button onClick={() => resolveLocalRefund(true)} className="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep">
                                            <span>반환 받았습니다</span><span className="text-[10px] opacity-80 font-normal">(패널티 0 처리)</span>
                                        </button>
                                        <button onClick={() => resolveLocalRefund(false)} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep">
                                            <span>반환받지 못했습니다</span><span className="text-[10px] opacity-80 font-normal">(미반환금 패널티 부과)</span>
                                        </button>
                                        <button onClick={() => setLocalRefundReq(null)} className="w-full py-3 text-slate-400 font-bold text-sm hover:bg-slate-50 rounded-xl break-keep">취소</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {localForfeitReq && (
                            <div className="fixed inset-0 z-[400] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-sm animate-fade-in">
                                <div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl animate-slide-up">
                                    <div className="bg-indigo-50 p-6 text-center border-b border-indigo-100">
                                        <div className="w-16 h-16 bg-white text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm text-2xl font-bold">?</div>
                                        <h3 className="text-xl font-black text-indigo-900 mb-1 break-keep">지급 일정으로 재변경</h3>
                                        <p className="text-slate-600 font-bold text-sm break-keep">이전에 다른 일정으로 변경하면서<br/>지급액을 반환(환수) 하셨나요?</p>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div className="text-center text-xs text-slate-400 mb-2 break-keep">기존: {localForfeitReq.oldVal}<br/>▼ <br/>변경: {localForfeitReq.session.title} (지급 {CURRENCY}{localForfeitReq.price})</div>
                                        <button onClick={() => resolveLocalForfeit(true)} className="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep">
                                            <span>네, 반환했습니다 (재지급)</span><span className="text-[10px] opacity-80 font-normal">(즉시 지급완료, 총액 100% 반영)</span>
                                        </button>
                                        <button onClick={() => resolveLocalForfeit(false)} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center leading-none gap-1 break-keep">
                                            <span>아니요, 미반환입니다 (상계)</span><span className="text-[10px] opacity-80 font-normal">(즉시 완료, 0원 지급으로 반영)</span>
                                        </button>
                                        <button onClick={() => setLocalForfeitReq(null)} className="w-full py-3 text-slate-400 font-bold text-sm hover:bg-slate-50 rounded-xl break-keep">취소</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const ManageView = ({ users, handleUserUpload, handleScheduleUpload, handleFullReset, handlePartialReset, exportAllData, schedules, setSchedules, logs, appBgImage, handleAppBgUpload, setAppBgImage, db, SYSTEM_APP_ID, admins, handleAddAdmin, handleDeleteAdmin, handleUpdateAdminRole, currentAdmin }) => {
            const [editingScheduleId, setEditingScheduleId] = useState(null);
            const [newAdminRole, setNewAdminRole] = useState('manager');
            
            const handleScheduleChange = (id, field, val) => {
                const newSchedules = schedules.map(s => {
                    if(s.id === id) {
                        const updated = { ...s, [field]: val };
                        if (db) db.collection('artifacts').doc(SYSTEM_APP_ID).collection('schedules').doc(id).update({ [field]: val }).catch(console.error);
                        return updated;
                    }
                    return s;
                });
                setSchedules(newSchedules);
            };

            const handleMoveSchedule = (index, dir) => {
                if(index === 0 && dir === -1) return;
                if(index === schedules.length - 1 && dir === 1) return;
                
                const newSchedules = [...schedules];
                const temp = newSchedules[index];
                newSchedules[index] = newSchedules[index + dir];
                newSchedules[index + dir] = temp;
                
                newSchedules.forEach((s, i) => {
                    s.order = i + 1;
                    if(db) db.collection('artifacts').doc(SYSTEM_APP_ID).collection('schedules').doc(s.id).update({ order: s.order });
                });
                setSchedules(newSchedules);
            };

            const handleDeleteSchedule = (id) => {
                if(!confirm('이 일정을 정말 삭제하시겠습니까? (관련된 스캔 기록은 모두 삭제됩니다)')) return;
                if(db) db.collection('artifacts').doc(SYSTEM_APP_ID).collection('schedules').doc(id).delete();
                setSchedules(schedules.filter(s => s.id !== id));
            };

            const handleAddSchedule = () => {
                const newId = `SCHED_${Date.now()}`;
                const newOrder = schedules.length > 0 ? Math.max(...schedules.map(s => s.order || 0)) + 1 : 1;
                const newSched = {
                    id: newId,
                    order: newOrder,
                    date: new Date().toISOString().split('T')[0],
                    displayDate: 'N일차',
                    title: '새로운 일정',
                    type: 'BOARDING',
                    nature: '관광',
                    price: 0,
                    targetKey: 'ALL',
                    targetVal: 'ALL'
                };
                if(db) db.collection('artifacts').doc(SYSTEM_APP_ID).collection('schedules').doc(newId).set(newSched);
                setSchedules([...schedules, newSched]);
            };
            
            const isMaster = currentAdmin && ['master', 'manager'].includes(currentAdmin.role);

            return (
                <div className="space-y-6 animate-slide-up no-print pb-10">
                    
                    {isMaster && (
                        <div className="bg-slate-800 text-white p-6 rounded-3xl shadow-xl border border-slate-700">
                            <h3 className="font-black text-2xl flex items-center gap-2 break-keep"><Icon name="settings" /> Master Data Setup</h3>
                            <p className="text-slate-400 text-xs mt-1 break-keep">엑셀 CSV 파일을 업로드하여 초기 데이터를 세팅합니다. (Master 전용)</p>
                            <div className="space-y-3 mt-5">
                                <div className="bg-slate-900/50 rounded-2xl border border-slate-600/50 p-4 flex justify-between items-center"><div className="flex items-center gap-3"><Icon name="users" className="text-indigo-400"/><div className="font-bold text-sm break-keep">1. 참가자 명단 (CSV)</div></div><label className="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-lg cursor-pointer text-xs transition-colors break-keep"><input type="file" accept=".csv" onChange={handleUserUpload} className="hidden" />업로드</label></div>
                                <div className="bg-slate-900/50 rounded-2xl border border-slate-600/50 p-4 flex justify-between items-center"><div className="flex items-center gap-3"><Icon name="dashboard" className="text-indigo-400"/><div className="font-bold text-sm break-keep">2. 일정 정보 (CSV)</div></div><label className="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-lg cursor-pointer text-xs transition-colors break-keep"><input type="file" accept=".csv" onChange={handleScheduleUpload} className="hidden" />업로드</label></div>
                                <div className="bg-slate-900/50 rounded-2xl border border-slate-600/50 p-4 flex justify-between items-center"><div className="flex items-center gap-3"><Icon name="image" className="text-indigo-400"/><div className="font-bold text-sm break-keep">3. 앱 배경화면</div></div><div className="flex gap-2">{appBgImage && <button onClick={() => setAppBgImage(null)} className="px-3 py-2 bg-rose-500/80 hover:bg-rose-500 rounded-lg text-xs font-bold transition-colors break-keep">초기화</button>}<label className="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-lg cursor-pointer text-xs transition-colors break-keep"><input type="file" accept="image/*" onChange={handleAppBgUpload} className="hidden" />업로드</label></div></div>
                                <p className="text-[10px] text-slate-400 mt-1 break-keep">* CSV 파일에 <strong>'순서'</strong> 열(Column)을 추가하여 숫자를 기재하거나 작성된 행(Row) 순서에 따라 현황판 정렬이 가능합니다.</p>
                            </div>
                        </div>
                    )}

                    <div className="bg-white p-6 rounded-3xl shadow-card border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2 break-keep"><Icon name="shield" /> 운영자(Admin) 권한 계정 관리</h3>
                                <p className="text-xs text-slate-500 mt-1 break-keep">{isMaster ? '현장에서 앱을 사용할 업무 담당자의 계정을 생성하고 권한을 관리하세요.' : '내 계정 정보'}</p>
                            </div>
                        </div>
                        
                        {isMaster && (
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-2 mb-4 p-4 bg-slate-50 rounded-2xl border border-slate-100 items-end">
                                <div><label className="text-[10px] font-bold text-slate-400 mb-1 block break-keep">이름/직책</label><input type="text" id="newAdminName" placeholder="예: 1호차 담당" className="w-full p-3 border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-incar break-keep" /></div>
                                <div><label className="text-[10px] font-bold text-slate-400 mb-1 block break-keep">로그인 ID</label><input type="text" id="newAdminId" placeholder="사번 등" className="w-full p-3 border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-incar break-keep" /></div>
                                <div><label className="text-[10px] font-bold text-slate-400 mb-1 block break-keep">비밀번호</label><input type="password" id="newAdminPw" placeholder="PIN" className="w-full p-3 border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-incar break-keep" /></div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 mb-1 block break-keep">권한 등급</label>
                                    <select value={newAdminRole} onChange={(e) => setNewAdminRole(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-incar bg-white break-keep">
                                        <option value="manager">매니저 (관리/설정)</option>
                                        <option value="staff">스태프 (스캔/조회)</option>
                                    </select>
                                </div>
                                <button onClick={() => {
                                    const name = document.getElementById('newAdminName').value;
                                    const id = document.getElementById('newAdminId').value;
                                    const pw = document.getElementById('newAdminPw').value;
                                    if(!name || !id || !pw) return alert('모든 정보를 입력하세요.');
                                    handleAddAdmin({ id, name, pw, role: newAdminRole });
                                    document.getElementById('newAdminName').value = '';
                                    document.getElementById('newAdminId').value = '';
                                    document.getElementById('newAdminPw').value = '';
                                    setNewAdminRole('manager');
                                }} className="bg-slate-800 hover:bg-slate-900 transition-colors text-white font-bold rounded-xl shadow-md p-3 w-full break-keep">계정 생성</button>
                            </div>
                        )}

                        <div className="overflow-x-auto rounded-xl border border-slate-200">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 text-slate-500 font-bold text-xs">
                                    <tr><th className="p-3 whitespace-nowrap">이름/직책</th><th className="p-3 whitespace-nowrap">로그인 ID</th><th className="p-3 text-center whitespace-nowrap">권한 등급</th><th className="p-3 whitespace-nowrap">비밀번호</th>{isMaster && <th className="p-3 text-center">관리</th>}</tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {admins.filter(a => isMaster || a.id === currentAdmin.id).map((a) => (
                                        <tr key={a.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-3 font-bold text-slate-800 whitespace-nowrap">{a.name}</td>
                                            <td className="p-3 text-slate-600 font-mono whitespace-nowrap">{a.id}</td>
                                            <td className="p-3 text-center">
                                                {isMaster && a.role !== 'master' ? (
                                                    <select 
                                                        value={a.role} 
                                                        onChange={(e) => handleUpdateAdminRole(a.id, e.target.value)}
                                                        className={`text-[10px] px-2 py-1 rounded font-bold border outline-none cursor-pointer whitespace-nowrap ${
                                                            a.role === 'manager' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'
                                                        }`}
                                                    >
                                                        <option value="manager">MANAGER</option>
                                                        <option value="staff">STAFF</option>
                                                    </select>
                                                ) : (
                                                    <span className={`text-[10px] px-2 py-1 rounded font-bold inline-block whitespace-nowrap ${a.role === 'master' ? 'bg-amber-100 text-amber-700' : a.role === 'manager' ? 'bg-indigo-100 text-indigo-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                                        {a.role.toUpperCase()}
                                                    </span>
                                                )}
                                            </td>
                                            <td className="p-3 text-slate-400 whitespace-nowrap">{isMaster || a.id === currentAdmin.id ? '••••' : '비공개'}</td>
                                            {isMaster && (
                                                <td className="p-3 text-center">
                                                    {a.role !== 'master' && <button onClick={() => handleDeleteAdmin(a.id)} className="p-1.5 bg-rose-50 text-rose-500 rounded-lg hover:bg-rose-100"><Icon name="trash" size={14}/></button>}
                                                </td>
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    {/* 🔥 세션 커스터마이징 에디터 */}
                    {isMaster && (
                        <div className="bg-white p-6 rounded-3xl shadow-card border border-slate-200">
                            <div className="flex justify-between items-start mb-4">
                                <div>
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2 break-keep">일정(세션)관리</h3>
                                    <p className="text-xs text-slate-500 mt-1 break-keep">엑셀 없이도 현장에서 일정을 직접 추가하고 모든 속성을 자유자재로 편집하세요.</p>
                                </div>

                                                    <td className="p-2 align-top pt-4 flex gap-1 items-center">

                                                        <span className="text-slate-400 font-bold">=</span>
                                                        <input type="text" value={s.targetVal} onChange={e=>handleScheduleChange(s.id, 'targetVal', e.target.value)} className="w-full min-w-[80px] p-1.5 text-xs bg-slate-50 border border-slate-200 focus:bg-white focus:border-incar outline-none rounded" placeholder="매칭값"/>
